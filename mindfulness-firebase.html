const fmtDate = iso => iso ? new Date(iso).toLocaleDateString("ko-KR",{month:"long",day:"numeric"}) : "";
const fmtDT   = iso => iso ? new Date(iso).toLocaleDateString("ko-KR",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const timeAgo = iso => {
  if(!iso) return "";
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1) return "방금"; if(m<60) return `${m}분 전`;
  const h=Math.floor(m/60); if(h<24) return `${h}시간 전`;

};

/* ── Firestore 래퍼 ── */
const FB = {
  async set(col, docId, data) {
    await setDoc(doc(db, col, docId), {...data, _updatedAt: new Date().toISOString()});
  },
  async get(col, docId) {
    const d = await getDoc(doc(db, col, docId));
    return d.exists() ? d.data() : null;
  },
  async list(col, constraints=[]) {
    const q = constraints.length ? query(collection(db, col), ...constraints) : collection(db, col);
    const snap = await getDocs(q);
    return snap.docs.map(d => ({id:d.id, ...d.data()}));
  },
  async del(col, docId) {
    await deleteDoc(doc(db, col, docId));
  },
};

          stroke-dasharray="${2*Math.PI*88}" stroke-dashoffset="${2*Math.PI*88}"
          stroke-linecap="round" style="transition:stroke-dashoffset .9s ease;" id="timer_arc"/>
        <text x="110" y="104" text-anchor="middle" dominant-baseline="middle" fill="#dce8f2" font-size="34" font-family="'Noto Sans KR',sans-serif" font-weight="600" style="transform:rotate(90deg);transform-origin:110px 110px;" id="timer_txt">${fmtTime(timerDur*60)}</text>

window.setDur = n => {
  timerDur = n;
  updateDurButtons();
  const cd = $("custom_dur_wrap");
  if(n===60) { cd.style.display="flex"; }
  else { cd.style.display="none"; $("timer_txt").textContent=fmtTime(n*60); $("timer_sub").textContent=n+"분"; }
};

function updateDurButtons() {
  DURATION_OPTIONS.forEach(n=>{
    const b=$(`dur_${n}`);
    if(!b) return;
    b.style.borderColor = n===timerDur ? "#62c9a2" : "#1c2b40";
    b.style.background  = n===timerDur ? "#62c9a220" : "transparent";
    b.style.color       = n===timerDur ? "#62c9a2" : "#92aabf";
    b.style.fontWeight  = n===timerDur ? "700" : "400";
  });
}

async function loadTimerStats() {
  const el=$("timer_stats"); if(!el)return;
  const sessions = await FB.list("sessions",[where("uid","==",currentUser.uid)]);
  const total = sessions.reduce((a,s)=>a+(s.duration||0),0);
  const todayCnt = sessions.filter(s=>s.date?.slice(0,10)===today()).length;
  el.innerHTML=[{l:"총 세션",v:`${sessions.length}회`},{l:"총 명상",v:`${total}분`},{l:"오늘",v:`${todayCnt}회`}].map(s=>`
    <div style="background:#121b2c;border-radius:12px;padding:10px 0;text-align:center;border:1px solid #1c2b40;flex:1;">
      <div style="color:#62c9a2;font-weight:700;font-size:17px;">${s.v}</div>
      <div style="color:#506070;font-size:11px;margin-top:2px;">${s.l}</div>
    </div>`).join("");
}

window.startTimer = () => {
  const cd=$("custom_dur")?.value;
  const effDur = (timerDur===60&&cd) ? (parseInt(cd)||60) : timerDur;
  timerLeft = effDur*60; timerElapsed=0; timerRunning=true;
  $("dur_picker").style.display="none";
  $("custom_dur_wrap").style.display="none";
  $("timer_ripple").style.display="block";
  $("timer_guide").style.display="block";
  $("timer_btns").innerHTML=`<button onclick="stopTimer()" style="padding:10px 28px;border-radius:24px;border:1.5px solid #d47a88;background:#d47a8820;color:#d47a88;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">멈추기</button>`;
  updateTimerArc(effDur*60, effDur*60);
  timerInterval = setInterval(()=>tickTimer(effDur), 1000);
};

function tickTimer(effDur) {
  timerElapsed++; timerLeft--;
  let guide=GUIDED_MSGS[0].t;
  for(const g of GUIDED_MSGS){if(timerElapsed>=g.at)guide=g.t;}
  $("timer_guide_txt") && ($("timer_guide_txt").textContent=guide);
  updateTimerArc(timerLeft, effDur*60);
  if(timerLeft<=0){
    clearInterval(timerInterval); timerRunning=false;
    finishTimer(effDur);
  }
}

function updateTimerArc(left, total) {
  const arc=$("timer_arc"), txt=$("timer_txt"), sub=$("timer_sub"); if(!arc)return;
  const prog = (total-left)/total;
  const circ = 2*Math.PI*88;
  arc.style.strokeDashoffset = circ-(prog*circ);
  txt.textContent = left>0?fmtTime(left):"✓";
  sub.textContent = left>0?`${Math.ceil(left/60)}분 남음`:"완료";
  if(left<=0){arc.style.stroke="#d9b065";txt.style.fill="#d9b065";}
}

async function finishTimer(dur) {
  $("timer_ripple").style.display="none";
  $("timer_guide_txt") && ($("timer_guide_txt").textContent="🙏 명상을 마쳤습니다. 잠시 그 고요함 안에 머물러 보세요.");
  $("timer_btns").innerHTML=`
    <button onclick="startTimer()" style="padding:10px 22px;border-radius:24px;border:1.5px solid #62c9a2;background:#62c9a220;color:#62c9a2;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">다시 하기</button>
    <button onclick="resetTimer()" style="padding:10px 22px;border-radius:24px;border:1.5px solid #d9b065;background:#d9b06520;color:#d9b065;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">완료 ✓</button>`;
  // Save session
  const sid=`${currentUser.uid}_${Date.now()}`;
  await FB.set("sessions", sid, { uid:currentUser.uid, name:currentUser.displayName, date:new Date().toISOString(), duration:dur });
  loadTimerStats();
}

window.stopTimer = () => {
  clearInterval(timerInterval); timerRunning=false;
  resetTimer();
};
window.resetTimer = () => {
  clearInterval(timerInterval); timerRunning=false;
  renderTimer();
};

function renderCalGrid() {
  const {yr,mo,challenge,jMap}=window._calState;
  const g=$("cal_grid"); if(!g)return;
  const first=new Date(yr,mo,1), dow=first.getDay(), dim=new Date(yr,mo+1,0).getDate();
  let html="";
  for(let i=0;i<dow;i++) html+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const date=isoDate(new Date(yr,mo,d));
    const inRange=challenge&&date>=challenge.startDate&&date<=challenge.endDate;
    const hasJ=!!jMap[date];
    const isT=date===today();
    const mood=hasJ&&jMap[date].moods?.[0]?.split(" ")[0]||"";
    html+=`<button onclick="openJournal('${date}')" style="aspect-ratio:1;border-radius:9px;border:1.5px solid ${isT?'#d9b065':hasJ?'#62c9a260':inRange?'#1c2b40':'transparent'};background:${hasJ?'#62c9a220':inRange?'#172030':'transparent'};color:${hasJ?'#62c9a2':inRange?'#dce8f2':'#2a3a4a'};font-size:12px;cursor:${inRange?'pointer':'default'};outline:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:inherit;position:relative;">

      ${isT?`<div style="position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:#d9b065;"></div>`:""}

}

window.selectJDur=n=>{

};
function updateJDurButtons(){
  DURATION_OPTIONS.forEach(n=>{

window.toggleJMood=m=>{
  const idx=window._jMoods.indexOf(m);
  if(idx>=0) window._jMoods.splice(idx,1); else window._jMoods.push(m);
  refreshJMoodUI();
};
function refreshJMoodUI(){
  const sel=$("j_mood_selected");
  if(sel){
    sel.style.display=window._jMoods.length>0?"flex":"none";
    sel.innerHTML=window._jMoods.map(m=>`<button onclick="toggleJMood('${m}')" style="padding:3px 10px;border-radius:12px;border:1px solid #62c9a2;background:#62c9a225;color:#62c9a2;font-size:12px;cursor:pointer;font-family:inherit;">${m} ✕</button>`).join("");

window.saveJournal=async(date)=>{
  const btn=$("j_save_btn"); if(btn){btn.disabled=true;btn.textContent="저장 중...";}
  const cd=$("j_custom_dur")?.value;
  const dur=(window._jSelDur===60&&cd)?(parseInt(cd)||60):window._jSelDur;
  const entry={
    uid:currentUser.uid, userName:currentUser.displayName, date,
    moods:[...window._jMoods], mood:window._jMoods[0]||"",
    duration:dur,
    reflectQ:$("j_reflectQ")?.value||"",
    body:$("j_body")?.value||"",
    insight:$("j_insight")?.value||"",
    createdAt:new Date().toISOString(),
  };
  await FB.set("journals",`${currentUser.uid}_${date}`,entry);
  // Update challenge checkedDates
  const ch=await FB.get("challenges",currentUser.uid);
  if(ch){
    const cd2=Array.from(new Set([...(ch.checkedDates||[]),date]));
    await FB.set("challenges",currentUser.uid,{...ch,checkedDates:cd2,userName:currentUser.displayName});
  }
  closeJournal();
  renderChallenge();
};

window.deleteJournal=async(date)=>{
  if(!confirm("이 저널을 삭제할까요?"))return;
  await FB.del("journals",`${currentUser.uid}_${date}`);
  const ch=await FB.get("challenges",currentUser.uid);
  if(ch){
    const cd=ch.checkedDates?.filter(d=>d!==date)||[];
    await FB.set("challenges",currentUser.uid,{...ch,checkedDates:cd,userName:currentUser.displayName});
  }
  closeJournal(); renderChallenge();
};

window.editJournal=async(date)=>{
  const j=await FB.get("journals",`${currentUser.uid}_${date}`);
  renderJournalInner(date,j,$("journal_inner"));
};

window.closeJournal=()=>{

window.startRec=async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream); audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    $("rec_btn_start").style.display="none"; $("rec_btn_stop").style.display="inline-block";
    $("rec_elapsed").style.display="block"; recElapsed=0;
    recInterval=setInterval(()=>{ recElapsed++; const re=$("rec_elapsed");if(re)re.textContent=fmtTime(recElapsed); },1000);
    // Animate waveform
    const wf=$("waveform");
    if(wf){ window._wfInterval=setInterval(()=>{
      wf.querySelectorAll("div").forEach((d,i)=>d.style.height=`${10+Math.abs(Math.sin(Date.now()/200+i*.5))*22}px`);
    },100); }
  }catch(e){alert("마이크 권한이 필요합니다.");}
};

window.stopRec=async()=>{
  clearInterval(recInterval); clearInterval(window._wfInterval);
  $("rec_btn_start").style.display="inline-block"; $("rec_btn_stop").style.display="none";
  $("rec_elapsed").style.display="none";
  if(!mediaRecorder)return;
  mediaRecorder.onstop=async()=>{
    const blob=new Blob(audioChunks,{type:"audio/webm"});
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    const title=$("rec_title")?.value||`${new Date().toLocaleDateString("ko-KR")} 녹음`;
    const cat=$("rec_cat")?.value||"명상 안내";
    const shared=$("rec_share")?.checked!==false;
    const rid=`${currentUser.uid}_${Date.now()}`;
    const path=`recordings/${currentUser.uid}/${rid}.webm`;
    // Upload to Firebase Storage
    const storageRef=ref(storage,path);
    await uploadBytes(storageRef,blob);
    const url=await getDownloadURL(storageRef);
    await FB.set("recordings",rid,{uid:currentUser.uid,userName:currentUser.displayName,title,cat,duration:recElapsed,downloadURL:url,storagePath:path,shared,createdAt:new Date().toISOString()});
    renderRecord();
  };
  mediaRecorder.stop();
};

window.playRec=(id,url)=>{
  if(playingId===id){currentAudio?.pause();playingId=null;currentAudio=null;return;}
  currentAudio?.pause();
  currentAudio=new Audio(url); currentAudio.play(); playingId=id;
  currentAudio.onended=()=>{playingId=null;currentAudio=null;};
};

window.deleteRec=async(id,path)=>{
  if(!confirm("녹음을 삭제할까요?"))return;
  if(path){try{await deleteObject(ref(storage,path));}catch(e){}}
  await FB.del("recordings",id);
  renderRecord();
};

    return `<div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="width:40px;height:40px;border-radius:50%;background:#62c9a225;display:flex;align-items:center;justify-content:center;color:#62c9a2;font-weight:700;font-size:16px;flex-shrink:0;">${u.userName?.[0]||"?"}</div>
        <div style="flex:1;">
          <p style="color:#dce8f2;font-weight:600;font-size:15px;margin-bottom:2px;">${u.userName}</p>
          <p style="color:#506070;font-size:12px;">${fmtDate(u.startDate)} ~ ${fmtDate(u.endDate)}</p>
        </div>
        <div style="text-align:right;">
          <div style="color:#62c9a2;font-weight:700;font-size:20px;">${u.checkedDates?.length||0}일</div>
          <div style="color:#506070;font-size:11px;">/${u.totalDays}일</div>
        </div>
      </div>
      <div style="height:6px;background:#1c2b40;border-radius:3px;margin-bottom:14px;">
        <div style="height:6px;width:${pct}%;background:#62c9a2;border-radius:3px;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        ${[{i:"📔",l:"저널",v:uj,c:"#7aaed4"},{i:"👩‍🏫",l:"가이드",v:ug,c:"#d9b065"},{i:"🎙️",l:"녹음",v:ur,c:"#a47ad4"},{i:"📅",l:"체크인",v:u.checkedDates?.length||0,c:"#62c9a2"}].map(s=>`
        <div style="background:#121b2c;border-radius:10px;padding:8px 6px;text-align:center;border:1px solid #1c2b40;">
          <div style="font-size:14px;margin-bottom:3px;">${s.i}</div>
          <div style="color:${s.c};font-weight:700;font-size:16px;">${s.v}</div>
          <div style="color:#2a3a4a;font-size:10px;margin-top:2px;line-height:1.3;">${s.l}</div>
        </div>`).join("")}
      </div>
    </div>`;
  }).join("")||'<p style="color:#506070;text-align:center;padding:40px 0;font-size:13px;">학생 데이터가 없습니다</p>';
}

function renderAdminJournals(){
  const {journals}=window._adminData;
  const byUser=journals.reduce((a,j)=>{(a[j.uid]=a[j.uid]||{name:j.userName,items:[]}).items.push(j);return a;},{});
  $("admin_content").innerHTML=`<p style="color:#92aabf;font-size:13px;margin-bottom:14px;">저널 현황 (날짜·기분·시간만 표시, 내용 비공개)</p>`+
    Object.entries(byUser).map(([uid,{name,items}])=>`
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:12px;">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <span style="color:#dce8f2;font-size:14px;font-weight:600;">${name}</span>
        <span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#62c9a220;color:#62c9a2;">${items.length}개 작성</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${items.map(j=>`<div style="background:#121b2c;border-radius:8px;padding:4px 10px;border:1px solid #1c2b40;">
          <span style="color:#92aabf;font-size:11px;">${j.date}</span>
          ${j.moods?.[0]?`<span style="color:#506070;font-size:10px;margin-left:4px;">${j.moods[0].split(" ")[0]}</span>`:""}
        </div>`).join("")}
      </div>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;font-size:13px;">저널 없음</p>';
}

function renderAdminPosts(){
  const {posts}=window._adminData;
  $("admin_content").innerHTML=posts.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(p=>`
    <div style="background:#0d1420;border-radius:12px;border:1px solid #1c2b40;padding:14px;margin-bottom:10px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <span style="color:#dce8f2;font-size:13px;font-weight:600;">${p.author}</span>
        <span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#62c9a220;color:#62c9a2;">${p.cat}</span>
        <span style="color:#506070;font-size:11px;margin-left:auto;">${timeAgo(p.createdAt)}</span>
      </div>
      <p style="color:#92aabf;font-size:13px;line-height:1.65;">${p.text?.slice(0,150)||""}${(p.text?.length||0)>150?"...":""}</p>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;font-size:13px;">게시글 없음</p>';
}

function renderAdminGuides(){
  const {guides}=window._adminData;
  $("admin_content").innerHTML=guides.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(g=>`
    <div style="background:#0d1420;border-radius:12px;border:1px solid #1c2b40;padding:14px;margin-bottom:10px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <span style="color:#dce8f2;font-size:13px;font-weight:600;">${g.userName}</span>
        <span style="color:#506070;font-size:11px;margin-left:auto;">${timeAgo(g.createdAt)}</span>
      </div>
      <p style="color:#92aabf;font-size:13px;">${g.script?.slice(0,120)||""}...</p>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;font-size:13px;">가이드 제출 없음</p>';
}

/* ══════════════════════════════════════════════════
   CSS ANIMATIONS
   ══════════════════════════════════════════════════ */
</script>

<style>
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
  @keyframes fadeIn { from{opacity:0;}to{opacity:1;} }
  @keyframes spin   { to{transform:rotate(360deg);} }
  @keyframes ripple { 0%{transform:scale(1);opacity:.5;}100%{transform:scale(3);opacity:0;} }
  @keyframes slideUp{ from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);} }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #06080e; }
  ::-webkit-scrollbar-thumb { background: #1c2b40; border-radius: 2px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
</style>
