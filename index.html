const isoDate     = d => { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0"); return y+"-"+m+"-"+dd; };
const today       = () => isoDate(new Date());
const addDays     = (ds,n) => { const d=new Date(ds); d.setDate(d.getDate()+n); return isoDate(d); };
const daysBetween = (a,b) => Math.round((new Date(b)-new Date(a))/86400000)+1;
const fmtDate     = iso => iso ? new Date(iso).toLocaleDateString("ko-KR",{month:"long",day:"numeric"}) : "";
const fmtDT       = iso => iso ? new Date(iso).toLocaleDateString("ko-KR",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
const fmtTime     = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const timeAgo     = iso => { if(!iso)return""; const m=Math.floor((Date.now()-new Date(iso))/60000); if(m<1)return"방금"; if(m<60)return`${m}분 전`; const h=Math.floor(m/60); if(h<24)return`${h}시간 전`; return`${Math.floor(h/24)}일 전`; };

const FB = {
  async set(col, docId, data) {
    await db.collection(col).doc(docId).set({...data, _updatedAt: new Date().toISOString()}, {merge:true});
  },
  async get(col, docId) {
    const d = await db.collection(col).doc(docId).get();
    return d.exists ? d.data() : null;
  },
  async list(col, filters=[]) {
    let q = db.collection(col);
    filters.forEach(f => {
      if(f.type==="where") q = q.where(f.field, f.op, f.val);
    });
    const snap = await q.get();
    let results = snap.docs.map(d => ({id:d.id, ...d.data()}));
    filters.forEach(f => {
      if(f.type==="orderBy") {
        results.sort((a,b) => {
          const av = a[f.field]||"", bv = b[f.field]||"";
          return f.dir==="desc" ? (bv>av?1:bv<av?-1:0) : (av>bv?1:av<bv?-1:0);
        });
      }
    });
    return results;
  },
  async del(col, docId) {
    await db.collection(col).doc(docId).delete();
  },
};
const W = (field,op,val) => ({type:"where",field,op,val});
const O = (field,dir)    => ({type:"orderBy",field,dir});

  const el = $("auth_msg"); if(!el) return;

}

async function doEmailLogin() {
  const email = $("email_l")?.value?.trim();
  const pw = $("pw_l")?.value;
  if(!email || !pw) { setAuthMsg("이메일과 비밀번호를 입력해주세요."); return; }
  setAuthMsg("로그인 중...", false);
  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch(e) {
    const msgs = {
      "auth/user-not-found": "등록되지 않은 이메일입니다.",
      "auth/wrong-password": "비밀번호가 틀렸습니다.",
      "auth/invalid-email": "이메일 형식이 올바르지 않습니다.",
      "auth/too-many-requests": "로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.",
      "auth/invalid-credential": "이메일 또는 비밀번호가 올바르지 않습니다.",
    };
    setAuthMsg(msgs[e.code] || "로그인 실패: " + e.message);
  }
}

async function doEmailSignup() {
  const name  = $("name_s")?.value?.trim();
  const email = $("email_s")?.value?.trim();
  const pw    = $("pw_s")?.value;
  if(!name)  { setAuthMsg("이름을 입력해주세요."); return; }
  if(!email) { setAuthMsg("이메일을 입력해주세요."); return; }
  if(!pw || pw.length < 6) { setAuthMsg("비밀번호는 6자 이상이어야 합니다."); return; }
  setAuthMsg("가입 중...", false);
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pw);
    await cred.user.updateProfile({ displayName: name });
    // onAuthStateChanged가 자동으로 render() 호출
  } catch(e) {
    const msgs = {
      "auth/email-already-in-use": "이미 사용 중인 이메일입니다.",
      "auth/invalid-email": "이메일 형식이 올바르지 않습니다.",
      "auth/weak-password": "비밀번호가 너무 약합니다.",
    };
    setAuthMsg(msgs[e.code] || "가입 실패: " + e.message);
  }
}

async function doForgotPassword() {
  const email = $("email_l")?.value?.trim();
  if(!email) { setAuthMsg("위에 이메일을 먼저 입력해주세요."); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    setAuthMsg("✅ 비밀번호 재설정 이메일을 보냈습니다.", false);
  } catch(e) {
    setAuthMsg("이메일 전송 실패: " + e.message);
  }
}

// ── 앱 초기화 (이메일 로그인 방식 - 모바일/카카오톡 완전 호환) ──
auth.onAuthStateChanged(async user => {
  currentUser = user;
  if (user) await saveUserProfile(user);
  render();
});

async function saveUserProfile(user) {
  await FB.set("users", user.uid, {
    uid: user.uid, name: user.displayName,
    email: user.email, photoURL: user.photoURL,
    lastLogin: new Date().toISOString(),
  });
}

function switchTimerMode(mode) {
  const isFree = mode === "free";
  $("section_free").style.display  = isFree ? "block" : "none";
  $("section_guide").style.display = isFree ? "none"  : "block";
  $("mode_free").style.background  = isFree ? "#62c9a2" : "transparent";
  $("mode_free").style.color       = isFree ? "#06080e" : "#506070";
  $("mode_free").style.fontWeight  = isFree ? "700" : "400";
  $("mode_guide").style.background = isFree ? "transparent" : "#62c9a2";
  $("mode_guide").style.color      = isFree ? "#506070" : "#06080e";
  $("mode_guide").style.fontWeight = isFree ? "400" : "700";
}

function selectGuide(id) {
  const g = GUIDED_CONTENT.find(x=>x.id===id); if(!g) return;
  selectedGuide = g;

  // 카드 하이라이트
  GUIDED_CONTENT.forEach(x=>{
    const card=$(`gc_${x.id}`);if(!card)return;
    card.style.borderColor = x.id===id ? x.color : "#1c2b40";
    card.style.background  = x.id===id ? x.color+"18" : "#0d1420";
  });

  // 플레이어 표시
  const gp=$("guide_player");if(gp)gp.style.display="block";
  const gi=$("gp_icon");if(gi)gi.textContent=g.icon;
  const gt=$("gp_title");if(gt)gt.textContent=g.title;
  const gd=$("gp_desc");if(gd)gd.textContent=g.desc+" ("+g.duration+"분)";
  const gdt=$("gp_dur_txt");if(gdt)gdt.textContent=fmtTime(g.duration*60);

  // 기존 오디오 정리
  if(guideAudio){ guideAudio.pause(); guideAudio=null; }
  const pb=$("gp_play_btn");if(pb)pb.textContent="▶";
  const gpr=$("gp_progress");if(gpr)gpr.style.width="0%";
  const gc=$("gp_cur");if(gc)gc.textContent="0:00";

  if(g.url){
    guideAudio = new Audio(g.url);
    guideAudio.ontimeupdate = updateGuideProgress;
    guideAudio.onended = () => { const pb=$("gp_play_btn");if(pb)pb.textContent="▶"; };
  }

  // 자막 박스 표시
  const gsub=$("gp_subtitle");if(gsub)gsub.style.display=g.url?"block":"none";
  if(!g.url){
    const gst=$("gp_subtitle_txt");
    if(gst)gst.innerHTML='<span style="color:#d9b065;font-size:13px;">⚠️ 음성 파일 준비 중입니다.<br>타이머와 함께 명상은 바로 사용 가능합니다.</span>';
    const gpsub=$("gp_subtitle");if(gpsub)gpsub.style.display="block";
  }

  gp.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function closeGuidePlayer() {
  if(guideAudio){guideAudio.pause();guideAudio=null;}
  selectedGuide=null;
  const gp=$("guide_player");if(gp)gp.style.display="none";
  GUIDED_CONTENT.forEach(x=>{
    const card=$(`gc_${x.id}`);if(!card)return;
    card.style.borderColor="#1c2b40";card.style.background="#0d1420";
  });
}

function toggleGuidePlay() {
  if(!guideAudio) return;
  const pb=$("gp_play_btn");
  if(guideAudio.paused){ guideAudio.play(); if(pb)pb.textContent="⏸"; }
  else { guideAudio.pause(); if(pb)pb.textContent="▶"; }
}

function seekGuide(sec) {
  if(!guideAudio)return;
  guideAudio.currentTime = Math.max(0, Math.min(guideAudio.duration||0, guideAudio.currentTime+sec));
}

function seekGuideAudio(e, bar) {
  if(!guideAudio||!guideAudio.duration)return;
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  guideAudio.currentTime=pct*guideAudio.duration;
}

function updateGuideProgress() {
  if(!guideAudio||!guideAudio.duration)return;
  const pct=guideAudio.currentTime/guideAudio.duration*100;
  const gpr=$("gp_progress");if(gpr)gpr.style.width=pct+"%";
  const gc=$("gp_cur");if(gc)gc.textContent=fmtTime(Math.floor(guideAudio.currentTime));
  // 자막 (GUIDED_MSGS 재활용)
  const elapsed=Math.floor(guideAudio.currentTime);
  let sub=GUIDED_MSGS[0].t;
  for(const g of GUIDED_MSGS){if(elapsed>=g.at)sub=g.t;}
  const gst=$("gp_subtitle_txt");if(gst&&guideAudio&&!guideAudio.paused)gst.textContent=sub;
}

// 가이드 + 타이머 동시 실행
let guideTimerInterval=null;
let guideTimerLeft=0;
let guideTimerElapsed=0;

function startTimerWithGuide() {
  const g=selectedGuide;if(!g)return;
  const dur=g.duration;
  guideTimerLeft=dur*60; guideTimerElapsed=0;

  $("guide_cards").style.display="none";
  $("guide_player").style.display="none";
  const gtw=$("guide_timer_wrap");if(gtw)gtw.style.display="block";
  const tr2=$("timer_ripple2");if(tr2)tr2.style.display="block";
  const gts=$("guide_timer_subtitle");if(gts)gts.style.display="block";

  // 오디오 재생
  if(guideAudio){guideAudio.currentTime=0;guideAudio.play();}

  updateGuideTimerArc(dur*60,dur*60);
  guideTimerInterval=setInterval(()=>{
    guideTimerElapsed++;guideTimerLeft--;
    let sub=GUIDED_MSGS[0].t;
    for(const gm of GUIDED_MSGS){if(guideTimerElapsed>=gm.at)sub=gm.t;}
    const gst=$("guide_timer_sub_txt");if(gst)gst.textContent=sub;
    updateGuideTimerArc(guideTimerLeft,dur*60);
    if(guideTimerLeft<=0){
      clearInterval(guideTimerInterval);
      if(guideAudio)guideAudio.pause();
      finishTimer(dur);
    }
  },1000);
}

function updateGuideTimerArc(left,total){
  const arc=$("guide_timer_arc"),txt=$("guide_timer_txt"),sub=$("guide_timer_sub");if(!arc)return;
  const circ=2*Math.PI*72;
  arc.style.strokeDashoffset=circ-((total-left)/total*circ);
  if(txt)txt.textContent=left>0?fmtTime(left):"✓";
  if(sub)sub.textContent=left>0?Math.ceil(left/60)+"분 남음":"완료";
  if(left<=0){arc.style.stroke="#d9b065";if(txt)txt.style.fill="#d9b065";}
}

function stopGuideTimer(){
  clearInterval(guideTimerInterval);
  if(guideAudio)guideAudio.pause();
  renderTimer();
}

function setDur(n) {
  timerDur = n;
  DURATION_OPTIONS.forEach(x => {
    const b = $(`dur_${x}`); if(!b) return;
    b.style.borderColor = x===n ? "#62c9a2" : "#1c2b40";
    b.style.background  = x===n ? "#62c9a220" : "transparent";
    b.style.color       = x===n ? "#62c9a2" : "#92aabf";
  });
  const cw = $("custom_dur_wrap");
  if(cw) cw.style.display = n===60 ? "flex" : "none";
  const tt = $("timer_txt"); if(tt && n!==60) tt.textContent = fmtTime(n*60);
  const ts = $("timer_sub"); if(ts && n!==60) ts.textContent = n+"분";
}

async function loadTimerStats() {
  const el = $("timer_stats"); if(!el) return;
  const sessions = await FB.list("sessions",[W("uid","==",currentUser.uid)]);
  const total = sessions.reduce((a,s)=>a+(s.duration||0),0);
  const todayCnt = sessions.filter(s=>s.date?.slice(0,10)===today()).length;
  el.innerHTML = [{l:"총 세션",v:`${sessions.length}회`},{l:"총 명상",v:`${total}분`},{l:"오늘",v:`${todayCnt}회`}].map(s=>`
    <div style="background:#121b2c;border-radius:12px;padding:10px 0;text-align:center;border:1px solid #1c2b40;flex:1;">
      <div style="color:#62c9a2;font-weight:700;font-size:17px;">${s.v}</div>
      <div style="color:#506070;font-size:11px;margin-top:2px;">${s.l}</div>
    </div>`).join("");
}

function startTimer() {
  const cd = $("custom_dur")?.value;
  const effDur = (timerDur===60 && cd) ? (parseInt(cd)||60) : timerDur;
  timerLeft = effDur*60; timerElapsed = 0; timerRunning = true;
  const dp = $("dur_picker"); if(dp) dp.style.display = "none";
  const cw = $("custom_dur_wrap"); if(cw) cw.style.display = "none";
  const tr = $("timer_ripple"); if(tr) tr.style.display = "block";
  const tg = $("timer_guide"); if(tg) tg.style.display = "block";
  const tb = $("timer_btns");
  if(tb) tb.innerHTML = `<button onclick="stopTimer()" style="padding:10px 28px;border-radius:24px;border:1.5px solid #d47a88;background:#d47a8820;color:#d47a88;font-size:14px;font-weight:600;cursor:pointer;">멈추기</button>`;
  updateTimerArc(effDur*60, effDur*60);
  timerInterval = setInterval(() => tickTimer(effDur), 1000);
}

function tickTimer(effDur) {
  timerElapsed++; timerLeft--;
  let guide = GUIDED_MSGS[0].t;
  for(const g of GUIDED_MSGS){ if(timerElapsed >= g.at) guide = g.t; }
  const gt = $("timer_guide_txt"); if(gt) gt.textContent = guide;
  updateTimerArc(timerLeft, effDur*60);
  if(timerLeft <= 0){ clearInterval(timerInterval); timerRunning = false; finishTimer(effDur); }
}

function updateTimerArc(left, total) {
  const arc=$("timer_arc"),txt=$("timer_txt"),sub=$("timer_sub"); if(!arc) return;
  const circ = 2*Math.PI*88;
  arc.style.strokeDashoffset = circ - ((total-left)/total*circ);
  if(txt) txt.textContent = left>0 ? fmtTime(left) : "✓";
  if(sub) sub.textContent = left>0 ? `${Math.ceil(left/60)}분 남음` : "완료";
  if(left<=0){ arc.style.stroke="#d9b065"; if(txt) txt.style.fill="#d9b065"; }
}

async function finishTimer(dur) {
  const tr = $("timer_ripple"); if(tr) tr.style.display = "none";
  const gt = $("timer_guide_txt"); if(gt) gt.textContent = "🙏 명상을 마쳤습니다. 잠시 그 고요함 안에 머물러 보세요.";
  const tb = $("timer_btns");
  if(tb) tb.innerHTML = `
    <button onclick="startTimer()" style="padding:10px 22px;border-radius:24px;border:1.5px solid #62c9a2;background:#62c9a220;color:#62c9a2;font-size:14px;font-weight:600;cursor:pointer;">다시 하기</button>
    <button onclick="resetTimer()" style="padding:10px 22px;border-radius:24px;border:1.5px solid #d9b065;background:#d9b06520;color:#d9b065;font-size:14px;font-weight:600;cursor:pointer;">완료 ✓</button>`;
  const sid = `${currentUser.uid}_${Date.now()}`;
  await FB.set("sessions", sid, {uid:currentUser.uid, name:currentUser.displayName, date:new Date().toISOString(), duration:dur});
  loadTimerStats();
}

function stopTimer()  { clearInterval(timerInterval); timerRunning=false; resetTimer(); }
function resetTimer() { clearInterval(timerInterval); timerRunning=false; renderTimer(); }

async function renderChallenge() {
  const m = $("main"); if(!m) return;
  const challenge = await FB.get("challenges", currentUser.uid);
  if(!challenge){ renderChallengeSetup(); return; }

  const journals = await FB.list("journals",[W("uid","==",currentUser.uid)]);
  const jMap = {};

function exportGCal() {
  const c = window._challengeData; if(!c) return;
  const title = encodeURIComponent(`명상 챌린지 ${c.totalDays}일`);
  const s = c.startDate.replace(/-/g,""), e = addDays(c.endDate,1).replace(/-/g,"");
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${s}/${e}&recur=RRULE:FREQ=DAILY`,"_blank");
}
function exportICS() {
  const c = window._challengeData; if(!c) return;
  const lines = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
    `DTSTART;VALUE=DATE:${c.startDate.replace(/-/g,"")}`,
    `DTEND;VALUE=DATE:${addDays(c.endDate,1).replace(/-/g,"")}`,
    `SUMMARY:명상 챌린지 ${c.totalDays}일`,`RRULE:FREQ=DAILY;COUNT=${c.totalDays}`,"END:VEVENT","END:VCALENDAR"];
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\r\n")],{type:"text/calendar"}));
  a.download = "meditation.ics"; a.click();
}

function calPrev() {
  const s = window._calState;
  if(s.mo===0){s.mo=11;s.yr--;}else s.mo--;
  const ct = $("cal_title"); if(ct) ct.textContent = `${s.yr}년 ${KO_MONTHS[s.mo]}`;
  renderCalGrid();
}
function calNext() {
  const s = window._calState;
  if(s.mo===11){s.mo=0;s.yr++;}else s.mo++;
  const ct = $("cal_title"); if(ct) ct.textContent = `${s.yr}년 ${KO_MONTHS[s.mo]}`;
  renderCalGrid();
}

function renderCalGrid() {
  const {yr,mo,challenge,jMap} = window._calState;
  const g = $("cal_grid"); if(!g) return;
  const first = new Date(yr,mo,1), dow = first.getDay(), dim = new Date(yr,mo+1,0).getDate();
  let html = "";
  for(let i=0;i<dow;i++) html += `<div></div>`;
  for(let d=1;d<=dim;d++){
    const date = isoDate(new Date(yr,mo,d));
    const inRange = challenge && date>=challenge.startDate && date<=challenge.endDate;
    const hasJ = !!jMap[date];
    const isT  = date===today();
    const mood = hasJ && jMap[date].moods?.[0] ? jMap[date].moods[0].split(" ")[0] : "";
    html += `<button onclick="openJournal('${date}')" style="aspect-ratio:1;border-radius:9px;border:1.5px solid ${isT?'#d9b065':hasJ?'#62c9a260':inRange?'#1c2b40':'transparent'};background:${hasJ?'#62c9a220':inRange?'#172030':'transparent'};color:${hasJ?'#62c9a2':inRange?'#dce8f2':'#2a3a4a'};font-size:12px;cursor:${inRange?'pointer':'default'};outline:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;">
      <span>${hasJ?"✓":d}</span>
      ${mood?`<span style="font-size:9px;">${mood}</span>`:""}
      ${isT?`<div style="position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:#d9b065;"></div>`:""}
    </button>`;
  }
  g.innerHTML = html;
}

function selectJDur(n) {

}
function updateJDurButtons() {
  DURATION_OPTIONS.forEach(n=>{
    const b=$(`jd_${n}`);if(!b)return;
    const sel=window._jSelDur===n;
    b.style.borderColor=sel?"#62c9a2":"#1c2b40";
    b.style.background=sel?"#62c9a220":"transparent";
    b.style.color=sel?"#62c9a2":"#92aabf";
  });
}
function toggleJMood(m) {
  const idx=window._jMoods.indexOf(m);
  if(idx>=0) window._jMoods.splice(idx,1); else window._jMoods.push(m);
  refreshJMoodUI();
}
function refreshJMoodUI() {
  const sel=$("j_mood_selected");
  if(sel){
    sel.style.display=window._jMoods.length>0?"flex":"none";
    sel.innerHTML=window._jMoods.map(m=>`<button onclick="toggleJMood('${m}')" style="padding:3px 10px;border-radius:12px;border:1px solid #62c9a2;background:#62c9a225;color:#62c9a2;font-size:12px;cursor:pointer;">${m} ✕</button>`).join("");
  }
  MOOD_LIST.forEach(mood=>{
    const key=mood.replace(/[^\w]/g,"_"),b=$(`jm_${key}`);if(!b)return;
    const s=window._jMoods.includes(mood);
    b.style.borderColor=s?"#62c9a2":"#1c2b40";
    b.style.background=s?"#62c9a220":"transparent";
    b.style.color=s?"#62c9a2":"#92aabf";
  });
}

    reflectQ:$("j_reflectQ")?.value||"",body:$("j_body")?.value||"",
    insight:$("j_insight")?.value||"",gratitude:$("j_gratitude")?.value||"",createdAt:new Date().toISOString()};
  await FB.set("journals",`${currentUser.uid}_${date}`,entry);
  const ch=await FB.get("challenges",currentUser.uid);
  if(ch){
    const cd2=Array.from(new Set([...(ch.checkedDates||[]),date]));
    await FB.set("challenges",currentUser.uid,{...ch,checkedDates:cd2,userName:currentUser.displayName});
  }
  window._jEditing=false;
  closeJournal();
  renderChallenge();
}

async function deleteJournal(date) {

  await FB.del("journals",`${currentUser.uid}_${date}`);
  const ch=await FB.get("challenges",currentUser.uid);
  if(ch){
    const cd=ch.checkedDates?.filter(d=>d!==date)||[];
    await FB.set("challenges",currentUser.uid,{...ch,checkedDates:cd,userName:currentUser.displayName});
  }
  closeJournal(); renderChallenge();
}

async function getRecAI(rid, title, cat, duration) {
  const box = $("rec_ai_"+rid), txt = $("rec_ai_txt_"+rid);
  if(!box||!txt) return;
  if(box.style.display==="block"){box.style.display="none";return;}
  box.style.display = "block";
  txt.textContent = "🤔 분석 중...";
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:500,
        system:`당신은 마음챙김 명상 교육 전문가입니다. 
학생의 명상 가이드 녹음에 대해 샌드위치 피드백 기법으로 응답하세요.
샌드위치 피드백: ① 긍정(잘된 점 1-2가지) → ② 개선점(1가지) → ③ 격려(마무리)
각 단계를 이모지로 구분하고 따뜻하고 구체적으로 300자 이내 한국어로.`,
        messages:[{role:"user",content:`제목: ${title}
카테고리: ${cat}
녹음 길이: ${duration}초 (${Math.floor(duration/60)}분 ${duration%60}초)

이 명상 가이드 녹음에 대해 샌드위치 피드백을 해주세요.`}]
      })
    });
    const d = await res.json();
    txt.textContent = d.content?.map(c=>c.text||"").join("") || "응답 오류";
  }catch(e){txt.textContent="오류: "+e.message;}
}

// 파일 선택 처리
function handleFileSelect(e) {
  const file = e.target.files[0]; if(!file) return;
  showUploadPreview(file);
}

function showUploadPreview(file) {
  const prev = $("upload_preview");
  const fn   = $("upload_filename");
  const fs   = $("upload_filesize");
  const ap   = $("upload_audio_preview");
  const dz   = $("upload_drop_zone");
  if(fn) fn.textContent = file.name;
  if(fs) fs.textContent = (file.size/1024/1024).toFixed(2) + " MB";
  if(ap) ap.src = URL.createObjectURL(file);
  if(prev) prev.style.display = "block";
  if(dz)   dz.style.borderColor = "#62c9a2";
  window._uploadFile = file;
}

function clearFileSelect() {
  window._uploadFile = null;
  const prev = $("upload_preview"); if(prev) prev.style.display="none";
  const fi   = $("rec_file_input"); if(fi)   fi.value="";
  const dz   = $("upload_drop_zone"); if(dz) dz.style.borderColor="#1c2b40";
  const ap   = $("upload_audio_preview"); if(ap){ ap.pause(); ap.src=""; }
}

// 파일 업로드 실행
async function uploadRecFile() {
  const file = window._uploadFile;
  if(!file){ alert("파일을 먼저 선택해주세요."); return; }

  const title  = $("rec_title")?.value || file.name.replace(/\.[^.]+$/, "");
  const cat    = $("rec_cat")?.value || "명상 안내";
  const shared = $("rec_share_upload")?.checked !== false;

  const btn = $("upload_btn");
  const prog = $("upload_progress");
  const bar  = $("upload_progress_bar");
  const stat = $("upload_status");

  if(btn) { btn.disabled=true; btn.textContent="업로드 중..."; }
  if(prog) prog.style.display = "block";

  try {
    const rid  = `${currentUser.uid}_${Date.now()}`;
    const ext  = file.name.split(".").pop() || "mp3";
    const path = `recordings/${currentUser.uid}/${rid}.${ext}`;
    const ref  = storage.ref(path);

    // 진행률 표시
    const task = ref.put(file);
    task.on("state_changed",
      snap => {
        const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
        if(bar)  bar.style.width = pct + "%";
        if(stat) stat.textContent = `업로드 중... ${pct}%`;
      },
      err => { throw err; }
    );
    await task;

    const url = await ref.getDownloadURL();

    // 오디오 길이 측정
    let dur = 0;
    try {
      const ap = $("upload_audio_preview");
      if(ap && ap.duration && isFinite(ap.duration)) dur = Math.round(ap.duration);
    } catch(e){}

    await FB.set("recordings", rid, {
      uid: currentUser.uid,
      userName: currentUser.displayName || currentUser.email,
      title, cat,
      duration: dur,
      downloadURL: url,
      storagePath: path,
      shared,
      createdAt: new Date().toISOString()
    });

    if(stat) stat.textContent = "✅ 업로드 완료!";
    if(bar)  bar.style.background = "#62c9a2";
    setTimeout(() => { clearFileSelect(); renderRecord(); }, 1200);

  } catch(e) {
    if(stat) stat.textContent = "❌ 오류: " + e.message;
    if(btn)  { btn.disabled=false; btn.textContent="⬆️ 업로드"; }
    console.error("upload error:", e);
  }
}

// 드래그앤드롭 처리 (렌더링 후 이벤트 연결)
function setupDropZone() {
  const dz = $("upload_drop_zone"); if(!dz) return;
  dz.addEventListener("dragover", e=>{ e.preventDefault(); dz.style.borderColor="#62c9a2"; });
  dz.addEventListener("dragleave", ()=>{ dz.style.borderColor="#1c2b40"; });
  dz.addEventListener("drop", e=>{
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if(file && file.type.startsWith("audio/")){ showUploadPreview(file); }
    else { alert("오디오 파일만 업로드 가능합니다."); }
  });
}

async function startRec() {
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    const s=$("rec_btn_start"),sp=$("rec_btn_stop"),re=$("rec_elapsed");
    if(s)s.style.display="none";if(sp)sp.style.display="inline-block";if(re){re.style.display="block";}
    recElapsed=0;
    recInterval=setInterval(()=>{recElapsed++;const re=$("rec_elapsed");if(re)re.textContent=fmtTime(recElapsed);},1000);
    const wf=$("waveform");
    if(wf) window._wfInterval=setInterval(()=>{wf.querySelectorAll("div").forEach((d,i)=>d.style.height=`${10+Math.abs(Math.sin(Date.now()/200+i*.5))*22}px`);},100);
  }catch(e){alert("마이크 권한이 필요합니다.");}
}

async function stopRec() {
  clearInterval(recInterval);clearInterval(window._wfInterval);
  const s=$("rec_btn_start"),sp=$("rec_btn_stop"),re=$("rec_elapsed");
  if(s)s.style.display="inline-block";if(sp)sp.style.display="none";if(re)re.style.display="none";
  if(!mediaRecorder)return;
  mediaRecorder.onstop=async()=>{
    const blob=new Blob(audioChunks,{type:"audio/webm"});
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    const title=$("rec_title")?.value||`${new Date().toLocaleDateString("ko-KR")} 녹음`;
    const cat=$("rec_cat")?.value||"명상 안내";
    const shared=$("rec_share")?.checked!==false;
    const rid=`${currentUser.uid}_${Date.now()}`;
    const path=`recordings/${currentUser.uid}/${rid}.webm`;
    const storageRef=storage.ref(path);
    try {
      await storageRef.put(blob);
      const url=await storageRef.getDownloadURL();
      await FB.set("recordings",rid,{
        uid:currentUser.uid,
        userName:currentUser.displayName||currentUser.email,
        title,cat,
        duration:recElapsed,
        downloadURL:url,
        storagePath:path,
        shared,
        createdAt:new Date().toISOString()
      });
      renderRecord();
    } catch(e) {
      alert("저장 오류: "+e.message+"\n\nFirebase Storage 규칙을 확인해주세요.");
      renderRecord();
    }
  };
  mediaRecorder.stop();
}

function playRec(id,url) {
  if(playingId===id){currentAudio?.pause();playingId=null;currentAudio=null;return;}
  currentAudio?.pause();
  currentAudio=new Audio(url);currentAudio.play();playingId=id;
  currentAudio.onended=()=>{playingId=null;currentAudio=null;};
}

async function deleteRec(id,path) {
  if(!confirm("녹음을 삭제할까요?"))return;
  if(path){try{await storage.ref(path).delete();}catch(e){}}
  await FB.del("recordings",id);
  renderRecord();
}

async function submitGuide() {
  const script=$("g_script")?.value?.trim();
  if(!script){alert("셀프 피드백을 입력해주세요.");return;}
  const btn=$("g_btn");if(btn){btn.disabled=true;btn.textContent="생성 중...";}
  const fb=$("g_feedback"),fbt=$("g_fb_txt");
  if(fb)fb.style.display="block";if(fbt)fbt.textContent="생각 중...";

  const topic        = $("g_topic")?.value||"";
  const practiceDate = $("g_datetime")?.value||"";
  const target       = $("g_target")?.value||"";
  const participants = $("g_participants")?.value||"";
  const notes        = $("g_notes")?.value||"";

  const prompt = [
    topic        ? "실습 주제: "+topic : "",
    practiceDate ? "실습 일시: "+practiceDate : "",
    target       ? "대상자: "+target : "",
    participants ? "실습 인원: "+participants+"명" : "",
    "\n[셀프 피드백]\n"+script,
    notes ? "\n[참여자 피드백]\n"+notes : "",
  ].filter(Boolean).join("\n");

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:600,
        system:"마음챙김 명상 교육 전문가입니다. 가이드 실습 기록을 읽고 샌드위치 피드백을 제공하세요.\n① 👍 잘된 점 (2가지, 구체적으로)\n② 🔧 개선 포인트 (1가지)\n③ 💡 다음 실습을 위한 제안 (1가지)\n따뜻하고 구체적으로, 400자 이내 한국어로.",
        messages:[{role:"user",content:prompt}]
      })
    });
    const d=await res.json();
    const reply=d.content?.map(c=>c.text||"").join("")||"오류";
    if(fbt)fbt.textContent=reply;
    const gid=`${currentUser.uid}_${Date.now()}`;
    await FB.set("guides",gid,{
      uid:currentUser.uid,
      userName:currentUser.displayName||currentUser.email,
      topic, practiceDate, target, participants,
      script,           // 셀프 피드백 (비공개)
      notes,            // 참여자 피드백 (비공개)
      feedback:reply,   // AI 피드백 (비공개)
      createdAt:new Date().toISOString()
      // ※ 공개되는 정보: userName, topic, practiceDate, participants (제출 여부 확인용)
    });
  }catch(e){if(fbt)fbt.textContent="오류: "+e.message;}
  if(btn){btn.disabled=false;btn.textContent="🤖 AI 샌드위치 피드백 받기";}
}

function renderMPGraph(){
  const {sessions,journals} = window._mpData;
  const mc = $("mp_content"); if(!mc) return;

  // 최근 30일 데이터 준비
  const days = 30;
  const labels = [], sesData = [], journalData = [], minsData = [];
  for(let i=days-1;i>=0;i--){
    const d = addDays(today(), -i);
    labels.push(d.slice(5)); // MM-DD
    const daySes = sessions.filter(s=>s.date?.slice(0,10)===d);
    const dayJ   = journals.filter(j=>j.date===d);
    sesData.push(daySes.length);
    journalData.push(dayJ.length);
    minsData.push(daySes.reduce((a,s)=>a+(s.duration||0),0));
  }

  // 기분 집계
  const moodCounts = {};
  journals.forEach(j=>(j.moods||[]).forEach(m=>{moodCounts[m]=(moodCounts[m]||0)+1;}));
  const topMoods = Object.entries(moodCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxMood = topMoods[0]?.[1]||1;

  // SVG 바 차트 그리기 함수
  const maxMins = Math.max(...minsData, 1);
  const maxSes  = Math.max(...sesData, 1);
  const W=320, H=100, pad=4;
  const barW = (W - pad*(days-1)) / days;

  const minsBar = minsData.map((v,i)=>{
    const h = Math.round((v/maxMins)*H);
    const x = i*(barW+pad);
    const col = v>0 ? "#62c9a2" : "#1c2b40";
    return `<rect x="${x.toFixed(1)}" y="${(H-h)}" width="${barW.toFixed(1)}" height="${h}" rx="2" fill="${col}" opacity="0.85"/>`;
  }).join("");

  const journalDots = journalData.map((v,i)=>{
    if(!v) return "";
    const x = i*(barW+pad)+barW/2;
    return `<circle cx="${x.toFixed(1)}" cy="6" r="4" fill="#d9b065"/>`;
  }).join("");

  mc.innerHTML = `
  <div style="animation:fadeUp .3s ease both;">
    <!-- 일별 명상시간 바 차트 -->
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <p style="color:#dce8f2;font-size:14px;font-weight:600;">📊 최근 30일 명상 현황</p>
        <div style="display:flex;gap:10px;font-size:11px;color:#506070;">
          <span><span style="display:inline-block;width:10px;height:10px;background:#62c9a2;border-radius:2px;margin-right:4px;"></span>명상(분)</span>
          <span><span style="display:inline-block;width:8px;height:8px;background:#d9b065;border-radius:50%;margin-right:4px;"></span>저널</span>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <svg viewBox="0 0 ${W} ${H+20}" style="width:100%;min-width:280px;display:block;">
          ${minsBar}
          ${journalDots}
          <!-- x축 라벨 (5일 간격) -->
          ${labels.map((l,i)=>i%5===0?`<text x="${(i*(barW+pad)+barW/2).toFixed(1)}" y="${H+15}" text-anchor="middle" fill="#506070" font-size="8">${l}</text>`:"").join("")}
        </svg>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #1c2b40;">
        <div style="text-align:center;flex:1;">
          <div style="color:#62c9a2;font-weight:700;font-size:18px;">${minsData.reduce((a,b)=>a+b,0)}</div>
          <div style="color:#506070;font-size:11px;">30일 총 분</div>
        </div>
        <div style="text-align:center;flex:1;">
          <div style="color:#7aaed4;font-weight:700;font-size:18px;">${sesData.reduce((a,b)=>a+b,0)}</div>
          <div style="color:#506070;font-size:11px;">30일 세션</div>
        </div>
        <div style="text-align:center;flex:1;">
          <div style="color:#d9b065;font-weight:700;font-size:18px;">${journalData.reduce((a,b)=>a+b,0)}</div>
          <div style="color:#506070;font-size:11px;">30일 저널</div>
        </div>
        <div style="text-align:center;flex:1;">
          <div style="color:#a47ad4;font-weight:700;font-size:18px;">${sesData.filter(v=>v>0).length}</div>
          <div style="color:#506070;font-size:11px;">활동일</div>
        </div>
      </div>
    </div>

    <!-- 기분 현황 -->
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:14px;">
      <p style="color:#dce8f2;font-size:14px;font-weight:600;margin-bottom:14px;">😌 기분 분포 (전체 저널)</p>
      ${topMoods.length ? topMoods.map(([mood,cnt])=>`
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="color:#dce8f2;font-size:13px;">${mood}</span>
          <span style="color:#62c9a2;font-size:12px;font-weight:600;">${cnt}회</span>
        </div>
        <div style="height:6px;background:#1c2b40;border-radius:3px;">
          <div style="height:6px;width:${Math.round(cnt/maxMood*100)}%;background:#62c9a2;border-radius:3px;transition:width .6s ease;"></div>
        </div>
      </div>`).join("") : '<p style="color:#506070;font-size:13px;">저널 데이터가 없습니다</p>'}
    </div>

    <!-- 요일별 패턴 -->
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;">
      <p style="color:#dce8f2;font-size:14px;font-weight:600;margin-bottom:14px;">📅 요일별 명상 패턴</p>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
        ${(()=>{
          const days7=["일","월","화","수","목","금","토"];
          const cnts=days7.map((_,di)=>sessions.filter(s=>new Date(s.date).getDay()===di).length);
          const maxC=Math.max(...cnts,1);
          return days7.map((day,di)=>{
            const cnt=cnts[di];
            const alpha=(0.2+cnt/maxC*0.8).toFixed(2);
            const bg=cnt===0?"#121b2c":"rgba(98,201,162,"+alpha+")";
            const col=cnt>0?"#62c9a2":"#2a3a4a";
            return '<div style="text-align:center;padding:10px 4px;background:'+bg+';border-radius:10px;border:1px solid #1c2b4060;"><div style="color:#506070;font-size:11px;margin-bottom:4px;">'+day+'</div><div style="color:'+col+';font-weight:700;font-size:16px;">'+cnt+'</div></div>';
          }).join("");
        })()}
      </div>
    </div>
  </div>`;
}

function renderMPGarden(){
  const {sessions, journals, challenge, streak} = window._mpData;

function switchAdminTab(id) {
  document.querySelectorAll("[id^='at_']").forEach(b=>{

    b.style.borderColor=sel?"#62c9a2":"#1c2b40";b.style.background=sel?"#62c9a220":"transparent";b.style.color=sel?"#62c9a2":"#92aabf";

  if(id==="adg")  renderAdminGuides();

function filterMembers() {
  const q = ($("member_search")?.value||"").toLowerCase();
  document.querySelectorAll(".member-row,.member-card").forEach(el=>{
    const name  = (el.dataset.name||"").toLowerCase();
    const email = (el.dataset.email||"").toLowerCase();
    el.style.display = (!q || name.includes(q) || email.includes(q)) ? "" : "none";
  });
}

function exportMemberCSV() {
  const list = window._memberList||[];
  const BOM = "﻿";
  const header = ["이름","이메일","세션수","총명상(분)","저널수","가이드수","챌린지진행"];
  const rows = list.map(m=>[m.name, m.email, m.sessions, m.totalMins, m.journals, m.guides, m.challenge]);
  const csv  = BOM + [header, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = `명상앱_명부_${today()}.csv`;
  a.click();
}

    Object.entries(byUser).map(([uid,{name,items}])=>`
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:12px;">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <span style="color:#dce8f2;font-size:14px;font-weight:600;">${name}</span>
        <span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#62c9a220;color:#62c9a2;">${items.length}개 작성</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${items.map(j=>`<div style="background:#121b2c;border-radius:8px;padding:4px 10px;border:1px solid #1c2b40;">
          <span style="color:#92aabf;font-size:11px;">${j.date}</span>
          ${j.moods?.[0]?`<span style="color:#506070;font-size:10px;margin-left:4px;">${j.moods[0].split(" ")[0]}</span>`:""}
        </div>`).join("")}
      </div>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;">저널 없음</p>';
}

function renderAdminPosts(){
  const {posts}=window._adminData;
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=posts.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(p=>`
    <div style="background:#0d1420;border-radius:12px;border:1px solid #1c2b40;padding:14px;margin-bottom:10px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <span style="color:#dce8f2;font-size:13px;font-weight:600;">${p.author}</span>
        <span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#62c9a220;color:#62c9a2;">${p.cat}</span>
        <span style="color:#506070;font-size:11px;margin-left:auto;">${timeAgo(p.createdAt)}</span>
      </div>
      <p style="color:#92aabf;font-size:13px;line-height:1.65;">${p.text?.slice(0,150)||""}</p>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;">게시글 없음</p>';
}

function renderAdminGuides(){
  const {guides}=window._adminData;
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=guides.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(g=>`
    <div style="background:#0d1420;border-radius:12px;border:1px solid #1c2b40;padding:14px;margin-bottom:10px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <span style="color:#dce8f2;font-size:13px;font-weight:600;">${g.userName}</span>
        <span style="color:#506070;font-size:11px;margin-left:auto;">${timeAgo(g.createdAt)}</span>
      </div>
      <p style="color:#92aabf;font-size:13px;">${g.script?.slice(0,120)||""}...</p>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;">가이드 제출 없음</p>';
}

</script>
</body>
</html>
