const FB = {
  async set(col, docId, data) {
    await db.collection(col).doc(docId).set({...data, _updatedAt: new Date().toISOString()}, {merge:true});
  },
  async get(col, docId) {
    const d = await db.collection(col).doc(docId).get();
    return d.exists ? d.data() : null;
  },
  async list(col, filters=[]) {
    let q = db.collection(col);
    filters.forEach(f => {
      if(f.type==="where") q = q.where(f.field, f.op, f.val);
    });
    const snap = await q.get();
    let results = snap.docs.map(d => ({id:d.id, ...d.data()}));
    filters.forEach(f => {
      if(f.type==="orderBy") {
        results.sort((a,b) => {
          const av = a[f.field]||"", bv = b[f.field]||"";
          return f.dir==="desc" ? (bv>av?1:bv<av?-1:0) : (av>bv?1:av<bv?-1:0);
        });
      }
    });
    return results;
  },
  async del(col, docId) {
    await db.collection(col).doc(docId).delete();
  },
};
const W = (field,op,val) => ({type:"where",field,op,val});

function copyUrl(url) {
  const msg = document.getElementById("copy_msg");
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      if(msg){ msg.style.display="block"; setTimeout(()=>msg.style.display="none", 3000); }
    }).catch(() => fallbackCopy(url, msg));
  } else {
    fallbackCopy(url, msg);
  }
}

function fallbackCopy(url, msg) {
  const ta = document.createElement("textarea");
  ta.value = url; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try {
    document.execCommand("copy");
    if(msg){ msg.style.display="block"; setTimeout(()=>msg.style.display="none", 3000); }
  } catch(e) {
    alert("мЈјмҶҢлҘј м§Ғм ‘ ліөмӮ¬н•ҙмЈјм„ёмҡ”:\n" + url);
  }
  document.body.removeChild(ta);
}

// в”Җв”Җ м•ұ мҙҲкё°нҷ” в”Җв”Җ
// мҲңм„ң: getRedirectResult нҷ•мқё вҶ’ onAuthStateChanged л“ұлЎқ
// лӘЁл°”мқј лҰ¬лӢӨмқҙл үнҠё нӣ„ race condition мҷ„м „ л°©м§Җ
let _authReady = false;

// лЎңл”© нҷ”л©ҙ н‘ңмӢң (нҺҳмқҙм§Җ мөңмҙҲ м§„мһ… мӢң)
document.body.innerHTML = `

    <div style="font-size:48px;filter:drop-shadow(0 0 20px #62c9a255)">рҹ§ҳ</div>
    <p style="color:#62c9a2;font-size:14px;letter-spacing:.5px;">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</p>
  </div>`;

// getRedirectResult: лӘЁл°”мқј лҰ¬лӢӨмқҙл үнҠё лЎңк·ёмқё нӣ„ кІ°кіј мҲҳмӢ 
auth.getRedirectResult()
  .then(async result => {
    if (result && result.user) {
      // лҰ¬лӢӨмқҙл үнҠё лЎңк·ёмқё м„ұкіө
      currentUser = result.user;
      _authReady = true;
      await saveUserProfile(result.user);
      render();
    }
    // result.user м—Ҷмңјл©ҙ вҶ’ onAuthStateChangedк°Җ мІҳлҰ¬
  })
  .catch(e => {
    console.log("getRedirectResult error:", e.code, e.message);
    // мҳӨлҘҳм—¬лҸ„ onAuthStateChangedк°Җ мқҙм–ҙм„ң мІҳлҰ¬
  })
  .finally(() => {
    // getRedirectResult мҷ„лЈҢ нӣ„ onAuthStateChanged л“ұлЎқ
    if (!_authReady) {
      auth.onAuthStateChanged(async user => {
        if (_authReady) return; // мқҙлҜё лҰ¬лӢӨмқҙл үнҠёлЎң мІҳлҰ¬лҗң кІҪмҡ° мҠӨнӮө
        currentUser = user;
        if (user) await saveUserProfile(user);
        render();
      });
    }
  });

async function saveUserProfile(user) {
  await FB.set("users", user.uid, {
    uid: user.uid, name: user.displayName,
    email: user.email, photoURL: user.photoURL,
    lastLogin: new Date().toISOString(),
  });
}

function setDur(n) {
  timerDur = n;
  DURATION_OPTIONS.forEach(x => {

  const tt = $("timer_txt"); if(tt && n!==60) tt.textContent = fmtTime(n*60);
  const ts = $("timer_sub"); if(ts && n!==60) ts.textContent = n+"л¶„";
}

async function loadTimerStats() {
  const el = $("timer_stats"); if(!el) return;
  const sessions = await FB.list("sessions",[W("uid","==",currentUser.uid)]);
  const total = sessions.reduce((a,s)=>a+(s.duration||0),0);
  const todayCnt = sessions.filter(s=>s.date?.slice(0,10)===today()).length;
  el.innerHTML = [{l:"мҙқ м„ём…ҳ",v:`${sessions.length}нҡҢ`},{l:"мҙқ лӘ…мғҒ",v:`${total}л¶„`},{l:"мҳӨлҠҳ",v:`${todayCnt}нҡҢ`}].map(s=>`
    <div style="background:#121b2c;border-radius:12px;padding:10px 0;text-align:center;border:1px solid #1c2b40;flex:1;">
      <div style="color:#62c9a2;font-weight:700;font-size:17px;">${s.v}</div>
      <div style="color:#506070;font-size:11px;margin-top:2px;">${s.l}</div>
    </div>`).join("");
}

function startTimer() {
  const cd = $("custom_dur")?.value;
  const effDur = (timerDur===60 && cd) ? (parseInt(cd)||60) : timerDur;
  timerLeft = effDur*60; timerElapsed = 0; timerRunning = true;
  const dp = $("dur_picker"); if(dp) dp.style.display = "none";
  const cw = $("custom_dur_wrap"); if(cw) cw.style.display = "none";
  const tr = $("timer_ripple"); if(tr) tr.style.display = "block";
  const tg = $("timer_guide"); if(tg) tg.style.display = "block";
  const tb = $("timer_btns");
  if(tb) tb.innerHTML = `<button onclick="stopTimer()" style="padding:10px 28px;border-radius:24px;border:1.5px solid #d47a88;background:#d47a8820;color:#d47a88;font-size:14px;font-weight:600;cursor:pointer;">л©Ҳм¶”кё°</button>`;
  updateTimerArc(effDur*60, effDur*60);
  timerInterval = setInterval(() => tickTimer(effDur), 1000);
}

function tickTimer(effDur) {
  timerElapsed++; timerLeft--;
  let guide = GUIDED_MSGS[0].t;
  for(const g of GUIDED_MSGS){ if(timerElapsed >= g.at) guide = g.t; }
  const gt = $("timer_guide_txt"); if(gt) gt.textContent = guide;
  updateTimerArc(timerLeft, effDur*60);
  if(timerLeft <= 0){ clearInterval(timerInterval); timerRunning = false; finishTimer(effDur); }
}

function updateTimerArc(left, total) {
  const arc=$("timer_arc"),txt=$("timer_txt"),sub=$("timer_sub"); if(!arc) return;
  const circ = 2*Math.PI*88;
  arc.style.strokeDashoffset = circ - ((total-left)/total*circ);
  if(txt) txt.textContent = left>0 ? fmtTime(left) : "вң“";
  if(sub) sub.textContent = left>0 ? `${Math.ceil(left/60)}л¶„ лӮЁмқҢ` : "мҷ„лЈҢ";
  if(left<=0){ arc.style.stroke="#d9b065"; if(txt) txt.style.fill="#d9b065"; }
}

async function finishTimer(dur) {
  const tr = $("timer_ripple"); if(tr) tr.style.display = "none";
  const gt = $("timer_guide_txt"); if(gt) gt.textContent = "рҹҷҸ лӘ…мғҒмқ„ л§ҲміӨмҠөлӢҲлӢӨ. мһ мӢң к·ё кі мҡ”н•Ё м•Ҳм—җ лЁёл¬јлҹ¬ ліҙм„ёмҡ”.";

  const sid = `${currentUser.uid}_${Date.now()}`;
  await FB.set("sessions", sid, {uid:currentUser.uid, name:currentUser.displayName, date:new Date().toISOString(), duration:dur});
  loadTimerStats();
}

function stopTimer()  { clearInterval(timerInterval); timerRunning=false; resetTimer(); }
function resetTimer() { clearInterval(timerInterval); timerRunning=false; renderTimer(); }

function exportGCal() {
  const c = window._challengeData; if(!c) return;
  const title = encodeURIComponent(`лӘ…мғҒ мұҢлҰ°м§Җ ${c.totalDays}мқј`);
  const s = c.startDate.replace(/-/g,""), e = addDays(c.endDate,1).replace(/-/g,"");
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${s}/${e}&recur=RRULE:FREQ=DAILY`,"_blank");
}
function exportICS() {
  const c = window._challengeData; if(!c) return;
  const lines = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
    `DTSTART;VALUE=DATE:${c.startDate.replace(/-/g,"")}`,
    `DTEND;VALUE=DATE:${addDays(c.endDate,1).replace(/-/g,"")}`,
    `SUMMARY:лӘ…мғҒ мұҢлҰ°м§Җ ${c.totalDays}мқј`,`RRULE:FREQ=DAILY;COUNT=${c.totalDays}`,"END:VEVENT","END:VCALENDAR"];
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\r\n")],{type:"text/calendar"}));
  a.download = "meditation.ics"; a.click();
}

function calPrev() {
  const s = window._calState;

  renderCalGrid();
}
function calNext() {
  const s = window._calState;

function renderCalGrid() {
  const {yr,mo,challenge,jMap} = window._calState;
  const g = $("cal_grid"); if(!g) return;
  const first = new Date(yr,mo,1), dow = first.getDay(), dim = new Date(yr,mo+1,0).getDate();
  let html = "";
  for(let i=0;i<dow;i++) html += `<div></div>`;
  for(let d=1;d<=dim;d++){
    const date = isoDate(new Date(yr,mo,d));
    const inRange = challenge && date>=challenge.startDate && date<=challenge.endDate;
    const hasJ = !!jMap[date];
    const isT  = date===today();
    const mood = hasJ && jMap[date].moods?.[0] ? jMap[date].moods[0].split(" ")[0] : "";
    html += `<button onclick="openJournal('${date}')" style="aspect-ratio:1;border-radius:9px;border:1.5px solid ${isT?'#d9b065':hasJ?'#62c9a260':inRange?'#1c2b40':'transparent'};background:${hasJ?'#62c9a220':inRange?'#172030':'transparent'};color:${hasJ?'#62c9a2':inRange?'#dce8f2':'#2a3a4a'};font-size:12px;cursor:${inRange?'pointer':'default'};outline:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;">

function updateJDurButtons() {

function toggleJMood(m) {
  const idx=window._jMoods.indexOf(m);

function refreshJMoodUI() {

async function saveJournal(date) {
  const btn=$("j_save_btn");if(btn){btn.disabled=true;btn.textContent="м ҖмһҘ мӨ‘...";}
  const cd=$("j_custom_dur")?.value;
  const dur=(window._jSelDur===60&&cd)?(parseInt(cd)||60):window._jSelDur;
  const entry={uid:currentUser.uid,userName:currentUser.displayName,date,
    moods:[...window._jMoods],mood:window._jMoods[0]||"",duration:dur,
    reflectQ:$("j_reflectQ")?.value||"",body:$("j_body")?.value||"",
    insight:$("j_insight")?.value||"",createdAt:new Date().toISOString()};
  await FB.set("journals",`${currentUser.uid}_${date}`,entry);
  const ch=await FB.get("challenges",currentUser.uid);
  if(ch){
    const cd2=Array.from(new Set([...(ch.checkedDates||[]),date]));
    await FB.set("challenges",currentUser.uid,{...ch,checkedDates:cd2,userName:currentUser.displayName});
  }
  window._jEditing=false;
  closeJournal();
  renderChallenge();
}

async function deleteJournal(date) {
  if(!confirm("мқҙ м Җл„җмқ„ мӮӯм ңн• к№Ңмҡ”?")) return;
  await FB.del("journals",`${currentUser.uid}_${date}`);
  const ch=await FB.get("challenges",currentUser.uid);
  if(ch){
    const cd=ch.checkedDates?.filter(d=>d!==date)||[];
    await FB.set("challenges",currentUser.uid,{...ch,checkedDates:cd,userName:currentUser.displayName});
  }
  closeJournal(); renderChallenge();
}

async function startRec() {
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    const s=$("rec_btn_start"),sp=$("rec_btn_stop"),re=$("rec_elapsed");
    if(s)s.style.display="none";if(sp)sp.style.display="inline-block";if(re){re.style.display="block";}
    recElapsed=0;
    recInterval=setInterval(()=>{recElapsed++;const re=$("rec_elapsed");if(re)re.textContent=fmtTime(recElapsed);},1000);
    const wf=$("waveform");
    if(wf) window._wfInterval=setInterval(()=>{wf.querySelectorAll("div").forEach((d,i)=>d.style.height=`${10+Math.abs(Math.sin(Date.now()/200+i*.5))*22}px`);},100);
  }catch(e){alert("л§ҲмқҙнҒ¬ к¶Ңн•ңмқҙ н•„мҡ”н•©лӢҲлӢӨ.");}
}

async function stopRec() {
  clearInterval(recInterval);clearInterval(window._wfInterval);
  const s=$("rec_btn_start"),sp=$("rec_btn_stop"),re=$("rec_elapsed");
  if(s)s.style.display="inline-block";if(sp)sp.style.display="none";if(re)re.style.display="none";
  if(!mediaRecorder)return;
  mediaRecorder.onstop=async()=>{
    const blob=new Blob(audioChunks,{type:"audio/webm"});
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    const title=$("rec_title")?.value||`${new Date().toLocaleDateString("ko-KR")} л…№мқҢ`;
    const cat=$("rec_cat")?.value||"лӘ…мғҒ м•ҲлӮҙ";
    const shared=$("rec_share")?.checked!==false;
    const rid=`${currentUser.uid}_${Date.now()}`;
    const path=`recordings/${currentUser.uid}/${rid}.webm`;
    const storageRef=storage.ref(path);
    await storageRef.put(blob);
    const url=await storageRef.getDownloadURL();
    await FB.set("recordings",rid,{uid:currentUser.uid,userName:currentUser.displayName,title,cat,duration:recElapsed,downloadURL:url,storagePath:path,shared,createdAt:new Date().toISOString()});
    renderRecord();
  };
  mediaRecorder.stop();
}

function playRec(id,url) {
  if(playingId===id){currentAudio?.pause();playingId=null;currentAudio=null;return;}
  currentAudio?.pause();
  currentAudio=new Audio(url);currentAudio.play();playingId=id;
  currentAudio.onended=()=>{playingId=null;currentAudio=null;};
}

async function deleteRec(id,path) {
  if(!confirm("л…№мқҢмқ„ мӮӯм ңн• к№Ңмҡ”?"))return;
  if(path){try{await storage.ref(path).delete();}catch(e){}}
  await FB.del("recordings",id);
  renderRecord();
}

      <p style="color:#92aabf;font-size:13px;line-height:1.65;">${h.script?.slice(0,150)||""}...</p>
      ${h.feedback?`<div style="background:#d9b06515;border-radius:8px;padding:8px 12px;border:1px solid #d9b06530;margin-top:8px;"><p style="color:#d9b065;font-size:12px;line-height:1.65;">${h.feedback.slice(0,120)}...</p></div>`:""}
    </div>`).join(""):'<p style="color:#506070;text-align:center;padding:40px 0;font-size:13px;">к°Җмқҙл“ң кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ</p>';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   кҙҖлҰ¬мһҗ нғӯ
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function renderAdmin() {
  const m=$("main");if(!m)return;
  if(!isAdmin()){m.innerHTML=`<p style="color:#d47a88;text-align:center;padding:40px;">кҙҖлҰ¬мһҗ к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.</p>`;return;}
  m.innerHTML=`<div style="text-align:center;padding:40px;color:#506070;">лҚ°мқҙн„° л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>`;
  const [users,challenges,sessions,recordings,journals,guides,posts]=await Promise.all([
    FB.list("users"),FB.list("challenges"),FB.list("sessions"),
    FB.list("recordings"),FB.list("journals"),FB.list("guides"),FB.list("posts"),
  ]);
  window._adminData={users,challenges,sessions,recordings,journals,guides,posts};

  m.innerHTML=`
  <div style="max-width:640px;margin:0 auto;animation:fadeUp .4s ease both;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-family:'Noto Serif KR',serif;color:#62c9a2;font-size:22px;">көҗмҲҳмһҗ лҢҖмӢңліҙл“ң</h2>
      <button onclick="renderAdmin()" style="padding:6px 14px;border-radius:20px;border:1px solid #1c2b40;background:transparent;color:#92aabf;font-size:12px;cursor:pointer;">мғҲлЎңкі м№Ё</button>
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:22px;">
      ${[["adov","рҹ“Ҡ к°ңмҡ”"],["adst","рҹ‘Ҙ н•ҷмғқ"],["adj","рҹ“” м Җл„җ"],["adp","рҹ’¬ кІҢмӢңкёҖ"],["adg","рҹ‘©вҖҚрҹҸ« к°Җмқҙл“ң"]].map(([id,l],i)=>`
      <button onclick="switchAdminTab('${id}')" id="at_${id}" style="padding:7px 14px;border-radius:20px;border:1px solid ${i===0?'#62c9a2':'#1c2b40'};background:${i===0?'#62c9a220':'transparent'};color:${i===0?'#62c9a2':'#92aabf'};font-size:12px;cursor:pointer;">${l}</button>`).join("")}
    </div>
    <div id="admin_content"></div>
  </div>`;
  renderAdminOverview();
}

function switchAdminTab(id) {
  document.querySelectorAll("[id^='at_']").forEach(b=>{
    const sel=b.id==="at_"+id;
    b.style.borderColor=sel?"#62c9a2":"#1c2b40";b.style.background=sel?"#62c9a220":"transparent";b.style.color=sel?"#62c9a2":"#92aabf";
  });
  if(id==="adov") renderAdminOverview();
  if(id==="adst") renderAdminStudents();
  if(id==="adj")  renderAdminJournals();
  if(id==="adp")  renderAdminPosts();
  if(id==="adg")  renderAdminGuides();
}

function renderAdminOverview(){
  const {challenges,sessions,recordings,journals,guides,posts}=window._adminData;
  const totalCheckins=challenges.reduce((a,c)=>a+(c.checkedDates?.length||0),0);
  const avgPct=challenges.length?Math.round(challenges.reduce((a,c)=>a+(c.checkedDates?.length||0)/(c.totalDays||30),0)/challenges.length*100):0;
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;">
      ${[{l:"м°ём—¬ н•ҷмғқ",v:challenges.length+"лӘ…",c:"#62c9a2"},{l:"мҙқ мІҙнҒ¬мқё",v:totalCheckins+"нҡҢ",c:"#d9b065"},
         {l:"нҸүк·  м§„н–үлҘ ",v:avgPct+"%",c:"#62c9a2"},{l:"м Җл„җ мһ‘м„ұ",v:journals.length+"к°ң",c:"#7aaed4"},
         {l:"л…№мқҢ м—…лЎңл“ң",v:recordings.length+"к°ң",c:"#a47ad4"},{l:"к°Җмқҙл“ң м ңм¶ң",v:guides.length+"к°ң",c:"#d47a88"}].map(s=>`
      <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:14px;">
        <div style="color:${s.c};font-weight:700;font-size:24px;margin-bottom:2px;">${s.v}</div>
        <div style="color:#506070;font-size:12px;">${s.l}</div>
      </div>`).join("")}
    </div>
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;">
      <p style="color:#92aabf;font-size:13px;margin-bottom:14px;">н•ҷмғқлі„ мұҢлҰ°м§Җ м§„н–үлҘ </p>
      ${challenges.sort((a,b)=>(b.checkedDates?.length/b.totalDays)-(a.checkedDates?.length/a.totalDays)).map(u=>{
        const ug=window._adminData.guides.filter(g=>g.uid===u.uid).length;
        const ur=window._adminData.recordings.filter(r=>r.uid===u.uid).length;
        return `<div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <div style="display:flex;gap:8px;align-items:center;">
              <span style="color:#dce8f2;font-size:13px;">${u.userName||u.uid}</span>
              ${ug>0?`<span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#d9b06520;color:#d9b065;">к°Җмқҙл“ң ${ug}</span>`:""}
              ${ur>0?`<span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#a47ad420;color:#a47ad4;">л…№мқҢ ${ur}</span>`:""}
            </div>
            <span style="color:#92aabf;font-size:12px;">${u.checkedDates?.length||0}/${u.totalDays}мқј</span>
          </div>
          <div style="height:5px;background:#1c2b40;border-radius:3px;">
            <div style="height:5px;width:${Math.round((u.checkedDates?.length||0)/u.totalDays*100)}%;background:#62c9a2;border-radius:3px;"></div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
}

function renderAdminStudents(){
  const {challenges,guides,recordings,journals}=window._adminData;
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=challenges.map(u=>{
    const ug=guides.filter(g=>g.uid===u.uid).length;
    const ur=recordings.filter(r=>r.uid===u.uid).length;
    const uj=journals.filter(j=>j.uid===u.uid).length;
    const pct=Math.round((u.checkedDates?.length||0)/u.totalDays*100);
    return `<div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="width:40px;height:40px;border-radius:50%;background:#62c9a225;display:flex;align-items:center;justify-content:center;color:#62c9a2;font-weight:700;font-size:16px;">${u.userName?.[0]||"?"}</div>
        <div style="flex:1;">
          <p style="color:#dce8f2;font-weight:600;font-size:15px;margin-bottom:2px;">${u.userName}</p>
          <p style="color:#506070;font-size:12px;">${fmtDate(u.startDate)} ~ ${fmtDate(u.endDate)}</p>
        </div>
        <div style="text-align:right;">
          <div style="color:#62c9a2;font-weight:700;font-size:20px;">${u.checkedDates?.length||0}мқј</div>
          <div style="color:#506070;font-size:11px;">/${u.totalDays}мқј</div>
        </div>
      </div>
      <div style="height:6px;background:#1c2b40;border-radius:3px;margin-bottom:14px;">
        <div style="height:6px;width:${pct}%;background:#62c9a2;border-radius:3px;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        ${[{i:"рҹ“”",l:"м Җл„җ",v:uj,c:"#7aaed4"},{i:"рҹ‘©вҖҚрҹҸ«",l:"к°Җмқҙл“ң",v:ug,c:"#d9b065"},{i:"рҹҺҷпёҸ",l:"л…№мқҢ",v:ur,c:"#a47ad4"},{i:"рҹ“…",l:"мІҙнҒ¬мқё",v:u.checkedDates?.length||0,c:"#62c9a2"}].map(s=>`
        <div style="background:#121b2c;border-radius:10px;padding:8px 6px;text-align:center;border:1px solid #1c2b40;">
          <div style="font-size:14px;margin-bottom:3px;">${s.i}</div>
          <div style="color:${s.c};font-weight:700;font-size:16px;">${s.v}</div>
          <div style="color:#2a3a4a;font-size:10px;margin-top:2px;">${s.l}</div>
        </div>`).join("")}
      </div>
    </div>`;
  }).join("")||'<p style="color:#506070;text-align:center;padding:40px 0;">н•ҷмғқ лҚ°мқҙн„° м—ҶмқҢ</p>';
}

function renderAdminJournals(){
  const {journals}=window._adminData;
  const byUser=journals.reduce((a,j)=>{(a[j.uid]=a[j.uid]||{name:j.userName,items:[]}).items.push(j);return a;},{});
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=`<p style="color:#92aabf;font-size:13px;margin-bottom:14px;">м Җл„җ нҳ„нҷ© (лӮ м§ңВ·кё°л¶„В·мӢңк°„л§Ң н‘ңмӢң)</p>`+
    Object.entries(byUser).map(([uid,{name,items}])=>`
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:12px;">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <span style="color:#dce8f2;font-size:14px;font-weight:600;">${name}</span>
        <span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#62c9a220;color:#62c9a2;">${items.length}к°ң мһ‘м„ұ</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${items.map(j=>`<div style="background:#121b2c;border-radius:8px;padding:4px 10px;border:1px solid #1c2b40;">
          <span style="color:#92aabf;font-size:11px;">${j.date}</span>
          ${j.moods?.[0]?`<span style="color:#506070;font-size:10px;margin-left:4px;">${j.moods[0].split(" ")[0]}</span>`:""}
        </div>`).join("")}
      </div>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;">м Җл„җ м—ҶмқҢ</p>';
}

function renderAdminPosts(){
  const {posts}=window._adminData;
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=posts.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(p=>`
    <div style="background:#0d1420;border-radius:12px;border:1px solid #1c2b40;padding:14px;margin-bottom:10px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <span style="color:#dce8f2;font-size:13px;font-weight:600;">${p.author}</span>
        <span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#62c9a220;color:#62c9a2;">${p.cat}</span>
        <span style="color:#506070;font-size:11px;margin-left:auto;">${timeAgo(p.createdAt)}</span>
      </div>
      <p style="color:#92aabf;font-size:13px;line-height:1.65;">${p.text?.slice(0,150)||""}</p>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;">кІҢмӢңкёҖ м—ҶмқҢ</p>';
}

function renderAdminGuides(){
  const {guides}=window._adminData;
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=guides.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(g=>`
    <div style="background:#0d1420;border-radius:12px;border:1px solid #1c2b40;padding:14px;margin-bottom:10px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <span style="color:#dce8f2;font-size:13px;font-weight:600;">${g.userName}</span>
        <span style="color:#506070;font-size:11px;margin-left:auto;">${timeAgo(g.createdAt)}</span>
      </div>
      <p style="color:#92aabf;font-size:13px;">${g.script?.slice(0,120)||""}...</p>
    </div>`).join("")||'<p style="color:#506070;text-align:center;padding:32px 0;">к°Җмқҙл“ң м ңм¶ң м—ҶмқҢ</p>';
}

</script>
