const FB = {
  async set(col, docId, data) {
    await db.collection(col).doc(docId).set({...data, _updatedAt: new Date().toISOString()}, {merge:true});
  },
  async get(col, docId) {
    const d = await db.collection(col).doc(docId).get();
    return d.exists ? d.data() : null;
  },
  async list(col, filters=[]) {
    let q = db.collection(col);
    filters.forEach(f => {
      if(f.type==="where") q = q.where(f.field, f.op, f.val);
    });
    const snap = await q.get();
    let results = snap.docs.map(d => ({id:d.id, ...d.data()}));
    filters.forEach(f => {
      if(f.type==="orderBy") {
        results.sort((a,b) => {
          const av = a[f.field]||"", bv = b[f.field]||"";
          return f.dir==="desc" ? (bv>av?1:bv<av?-1:0) : (av>bv?1:av<bv?-1:0);
        });
      }
    });
    return results;
  },
  async del(col, docId) {
    await db.collection(col).doc(docId).delete();
  },
};
const W = (field,op,val) => ({type:"where",field,op,val});
const O = (field,dir)    => ({type:"orderBy",field,dir});

function setAuthMsg(txt, isErr=true) {
  const el = $("auth_msg"); if(!el) return;

  el.style.color = isErr ? "#d47a88" : "#62c9a2";
}

async function doEmailLogin() {
  const email = $("email_l")?.value?.trim();
  const pw = $("pw_l")?.value;
  if(!email || !pw) { setAuthMsg("이메일과 비밀번호를 입력해주세요."); return; }
  setAuthMsg("로그인 중...", false);
  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch(e) {
    const msgs = {
      "auth/user-not-found": "등록되지 않은 이메일입니다.",
      "auth/wrong-password": "비밀번호가 틀렸습니다.",
      "auth/invalid-email": "이메일 형식이 올바르지 않습니다.",
      "auth/too-many-requests": "로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.",
      "auth/invalid-credential": "이메일 또는 비밀번호가 올바르지 않습니다.",
    };
    setAuthMsg(msgs[e.code] || "로그인 실패: " + e.message);
  }
}

async function doEmailSignup() {
  const name  = $("name_s")?.value?.trim();
  const email = $("email_s")?.value?.trim();
  const pw    = $("pw_s")?.value;
  if(!name)  { setAuthMsg("이름을 입력해주세요."); return; }
  if(!email) { setAuthMsg("이메일을 입력해주세요."); return; }
  if(!pw || pw.length < 6) { setAuthMsg("비밀번호는 6자 이상이어야 합니다."); return; }
  setAuthMsg("가입 중...", false);
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pw);
    await cred.user.updateProfile({ displayName: name });
    // onAuthStateChanged가 자동으로 render() 호출
  } catch(e) {
    const msgs = {
      "auth/email-already-in-use": "이미 사용 중인 이메일입니다.",
      "auth/invalid-email": "이메일 형식이 올바르지 않습니다.",
      "auth/weak-password": "비밀번호가 너무 약합니다.",
    };
    setAuthMsg(msgs[e.code] || "가입 실패: " + e.message);
  }
}

async function doForgotPassword() {
  const email = $("email_l")?.value?.trim();
  if(!email) { setAuthMsg("위에 이메일을 먼저 입력해주세요."); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    setAuthMsg("✅ 비밀번호 재설정 이메일을 보냈습니다.", false);
  } catch(e) {
    setAuthMsg("이메일 전송 실패: " + e.message);
  }
}

        <text x="110" y="104" text-anchor="middle" dominant-baseline="middle" fill="#dce8f2" font-size="34" font-weight="600" style="transform:rotate(90deg);transform-origin:110px 110px;" id="timer_txt">${fmtTime(timerDur*60)}</text>
        <text x="110" y="130" text-anchor="middle" dominant-baseline="middle" fill="#506070" font-size="12" style="transform:rotate(90deg);transform-origin:110px 110px;" id="timer_sub">${timerDur}분</text>

function setDur(n) {
  timerDur = n;
  DURATION_OPTIONS.forEach(x => {
    const b = $(`dur_${x}`); if(!b) return;
    b.style.borderColor = x===n ? "#62c9a2" : "#1c2b40";
    b.style.background  = x===n ? "#62c9a220" : "transparent";
    b.style.color       = x===n ? "#62c9a2" : "#92aabf";
  });
  const cw = $("custom_dur_wrap");
  if(cw) cw.style.display = n===60 ? "flex" : "none";
  const tt = $("timer_txt"); if(tt && n!==60) tt.textContent = fmtTime(n*60);
  const ts = $("timer_sub"); if(ts && n!==60) ts.textContent = n+"분";
}

async function loadTimerStats() {
  const el = $("timer_stats"); if(!el) return;
  const sessions = await FB.list("sessions",[W("uid","==",currentUser.uid)]);
  const total = sessions.reduce((a,s)=>a+(s.duration||0),0);
  const todayCnt = sessions.filter(s=>s.date?.slice(0,10)===today()).length;
  el.innerHTML = [{l:"총 세션",v:`${sessions.length}회`},{l:"총 명상",v:`${total}분`},{l:"오늘",v:`${todayCnt}회`}].map(s=>`
    <div style="background:#121b2c;border-radius:12px;padding:10px 0;text-align:center;border:1px solid #1c2b40;flex:1;">
      <div style="color:#62c9a2;font-weight:700;font-size:17px;">${s.v}</div>
      <div style="color:#506070;font-size:11px;margin-top:2px;">${s.l}</div>
    </div>`).join("");
}

function startTimer() {
  const cd = $("custom_dur")?.value;
  const effDur = (timerDur===60 && cd) ? (parseInt(cd)||60) : timerDur;
  timerLeft = effDur*60; timerElapsed = 0; timerRunning = true;
  const dp = $("dur_picker"); if(dp) dp.style.display = "none";
  const cw = $("custom_dur_wrap"); if(cw) cw.style.display = "none";
  const tr = $("timer_ripple"); if(tr) tr.style.display = "block";
  const tg = $("timer_guide"); if(tg) tg.style.display = "block";
  const tb = $("timer_btns");
  if(tb) tb.innerHTML = `<button onclick="stopTimer()" style="padding:10px 28px;border-radius:24px;border:1.5px solid #d47a88;background:#d47a8820;color:#d47a88;font-size:14px;font-weight:600;cursor:pointer;">멈추기</button>`;
  updateTimerArc(effDur*60, effDur*60);
  timerInterval = setInterval(() => tickTimer(effDur), 1000);
}

function tickTimer(effDur) {
  timerElapsed++; timerLeft--;
  let guide = GUIDED_MSGS[0].t;
  for(const g of GUIDED_MSGS){ if(timerElapsed >= g.at) guide = g.t; }
  const gt = $("timer_guide_txt"); if(gt) gt.textContent = guide;
  updateTimerArc(timerLeft, effDur*60);
  if(timerLeft <= 0){ clearInterval(timerInterval); timerRunning = false; finishTimer(effDur); }
}

function updateTimerArc(left, total) {
  const arc=$("timer_arc"),txt=$("timer_txt"),sub=$("timer_sub"); if(!arc) return;
  const circ = 2*Math.PI*88;
  arc.style.strokeDashoffset = circ - ((total-left)/total*circ);
  if(txt) txt.textContent = left>0 ? fmtTime(left) : "✓";
  if(sub) sub.textContent = left>0 ? `${Math.ceil(left/60)}분 남음` : "완료";
  if(left<=0){ arc.style.stroke="#d9b065"; if(txt) txt.style.fill="#d9b065"; }
}

async function finishTimer(dur) {
  const tr = $("timer_ripple"); if(tr) tr.style.display = "none";
  const gt = $("timer_guide_txt"); if(gt) gt.textContent = "🙏 명상을 마쳤습니다. 잠시 그 고요함 안에 머물러 보세요.";
  const tb = $("timer_btns");
  if(tb) tb.innerHTML = `
    <button onclick="startTimer()" style="padding:10px 22px;border-radius:24px;border:1.5px solid #62c9a2;background:#62c9a220;color:#62c9a2;font-size:14px;font-weight:600;cursor:pointer;">다시 하기</button>
    <button onclick="resetTimer()" style="padding:10px 22px;border-radius:24px;border:1.5px solid #d9b065;background:#d9b06520;color:#d9b065;font-size:14px;font-weight:600;cursor:pointer;">완료 ✓</button>`;
  const sid = `${currentUser.uid}_${Date.now()}`;
  await FB.set("sessions", sid, {uid:currentUser.uid, name:currentUser.displayName, date:new Date().toISOString(), duration:dur});
  loadTimerStats();
}

function stopTimer()  { clearInterval(timerInterval); timerRunning=false; resetTimer(); }
function resetTimer() { clearInterval(timerInterval); timerRunning=false; renderTimer(); }

function exportGCal() {
  const c = window._challengeData; if(!c) return;
  const title = encodeURIComponent(`명상 챌린지 ${c.totalDays}일`);

  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${s}/${e}&recur=RRULE:FREQ=DAILY`,"_blank");
}
function exportICS() {
  const c = window._challengeData; if(!c) return;
  const lines = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
    `DTSTART;VALUE=DATE:${c.startDate.replace(/-/g,"")}`,
    `DTEND;VALUE=DATE:${addDays(c.endDate,1).replace(/-/g,"")}`,
    `SUMMARY:명상 챌린지 ${c.totalDays}일`,`RRULE:FREQ=DAILY;COUNT=${c.totalDays}`,"END:VEVENT","END:VCALENDAR"];
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\r\n")],{type:"text/calendar"}));
  a.download = "meditation.ics"; a.click();
}

function updateJDurButtons() {

function toggleJMood(m) {
  const idx=window._jMoods.indexOf(m);

function refreshJMoodUI() {

async function saveJournal(date) {
  const btn=$("j_save_btn");if(btn){btn.disabled=true;btn.textContent="저장 중...";}
  const cd=$("j_custom_dur")?.value;
  const dur=(window._jSelDur===60&&cd)?(parseInt(cd)||60):window._jSelDur;
  const entry={uid:currentUser.uid,userName:currentUser.displayName,date,
    moods:[...window._jMoods],mood:window._jMoods[0]||"",duration:dur,
    reflectQ:$("j_reflectQ")?.value||"",body:$("j_body")?.value||"",
    insight:$("j_insight")?.value||"",createdAt:new Date().toISOString()};
  await FB.set("journals",`${currentUser.uid}_${date}`,entry);

    const cd=ch.checkedDates?.filter(d=>d!==date)||[];
    await FB.set("challenges",currentUser.uid,{...ch,checkedDates:cd,userName:currentUser.displayName});

}

function recCard(r,mine=false){

          </div>
        </div>
      </div>

        ${r.downloadURL?`<button onclick="playRec('${r.id}','${r.downloadURL}')" style="width:34px;height:34px;border-radius:50%;border:1.5px solid #1c2b40;background:transparent;color:#92aabf;cursor:pointer;font-size:14px;">▶</button>`:""}
        ${mine?`<button onclick="deleteRec('${r.id}','${r.storagePath||''}')" style="width:34px;height:34px;border-radius:50%;border:1px solid #1c2b40;background:transparent;color:#506070;cursor:pointer;font-size:13px;">✕</button>`:""}
      </div>
    </div>
  </div>`;
}

async function startRec() {
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    const s=$("rec_btn_start"),sp=$("rec_btn_stop"),re=$("rec_elapsed");
    if(s)s.style.display="none";if(sp)sp.style.display="inline-block";if(re){re.style.display="block";}
    recElapsed=0;
    recInterval=setInterval(()=>{recElapsed++;const re=$("rec_elapsed");if(re)re.textContent=fmtTime(recElapsed);},1000);
    const wf=$("waveform");
    if(wf) window._wfInterval=setInterval(()=>{wf.querySelectorAll("div").forEach((d,i)=>d.style.height=`${10+Math.abs(Math.sin(Date.now()/200+i*.5))*22}px`);},100);
  }catch(e){alert("마이크 권한이 필요합니다.");}
}

async function stopRec() {
  clearInterval(recInterval);clearInterval(window._wfInterval);
  const s=$("rec_btn_start"),sp=$("rec_btn_stop"),re=$("rec_elapsed");
  if(s)s.style.display="inline-block";if(sp)sp.style.display="none";if(re)re.style.display="none";
  if(!mediaRecorder)return;
  mediaRecorder.onstop=async()=>{
    const blob=new Blob(audioChunks,{type:"audio/webm"});
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    const title=$("rec_title")?.value||`${new Date().toLocaleDateString("ko-KR")} 녹음`;
    const cat=$("rec_cat")?.value||"명상 안내";
    const shared=$("rec_share")?.checked!==false;
    const rid=`${currentUser.uid}_${Date.now()}`;
    const path=`recordings/${currentUser.uid}/${rid}.webm`;
    const storageRef=storage.ref(path);
    await storageRef.put(blob);
    const url=await storageRef.getDownloadURL();
    await FB.set("recordings",rid,{uid:currentUser.uid,userName:currentUser.displayName,title,cat,duration:recElapsed,downloadURL:url,storagePath:path,shared,createdAt:new Date().toISOString()});
    renderRecord();
  };
  mediaRecorder.stop();
}

function playRec(id,url) {
  if(playingId===id){currentAudio?.pause();playingId=null;currentAudio=null;return;}
  currentAudio?.pause();
  currentAudio=new Audio(url);currentAudio.play();playingId=id;
  currentAudio.onended=()=>{playingId=null;currentAudio=null;};
}

async function deleteRec(id,path) {
  if(!confirm("녹음을 삭제할까요?"))return;
  if(path){try{await storage.ref(path).delete();}catch(e){}}
  await FB.del("recordings",id);
  renderRecord();
}

function selectPostCat(c) {

async function submitPost() {
  const text=$("post_body")?.value?.trim();if(!text)return;
  const pid=`${currentUser.uid}_${Date.now()}`;
  await FB.set("posts",pid,{uid:currentUser.uid,author:currentUser.displayName,cat:window._selCat||"명상 후기",text,likes:[],createdAt:new Date().toISOString()});

async function likePost(id) {
  const p=await FB.get("posts",id);if(!p)return;
  const likes=p.likes||[];
  await FB.set("posts",id,{...p,likes:likes.includes(currentUser.uid)?likes.filter(u=>u!==currentUser.uid):[...likes,currentUser.uid]});
  renderCommunity();
}

async function getPostAI(id,cat,text) {
  const r=$(`ai_r_${id}`),t=$(`ai_rt_${id}`);if(!r||!t)return;
  r.style.display="block";t.textContent="생각 중...";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,
        system:"따뜻한 마음챙김 선생님입니다. 학생 글에 2-3문장으로 진심 어린 통찰과 격려를 한국어로 전하세요.",
        messages:[{role:"user",content:`[${cat}] ${text}`}]})});
    const d=await res.json();t.textContent=d.content?.map(c=>c.text||"").join("")||"오류";
  }catch{t.textContent="AI 오류";}
}

async function submitGuide() {
  const script=$("g_script")?.value?.trim();if(!script)return;
  const btn=$("g_btn");if(btn){btn.disabled=true;btn.textContent="생성 중...";}
  const fb=$("g_feedback"),fbt=$("g_fb_txt");
  if(fb)fb.style.display="block";if(fbt)fbt.textContent="생각 중...";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
        system:"마음챙김 명상 교육 전문가입니다. ✅ 잘된 점: (2가지)\n🔧 개선점: (1-2가지)\n💡 다음 제안: (1가지) 형식으로 300자 내외 한국어로.",
        messages:[{role:"user",content:script+($("g_notes")?.value?`\n메모:${$("g_notes").value}`:"")}]})});
    const d=await res.json();
    const reply=d.content?.map(c=>c.text||"").join("")||"오류";
    if(fbt)fbt.textContent=reply;
    const gid=`${currentUser.uid}_${Date.now()}`;
    await FB.set("guides",gid,{uid:currentUser.uid,userName:currentUser.displayName,script,notes:$("g_notes")?.value||"",feedback:reply,createdAt:new Date().toISOString()});
  }catch(e){if(fbt)fbt.textContent="오류: "+e.message;}
  if(btn){btn.disabled=false;btn.textContent="🤖 AI 피드백 받기";}
}

      ${h.feedback?`<div style="background:#d9b06515;border-radius:8px;padding:8px 12px;border:1px solid #d9b06530;margin-top:8px;"><p style="color:#d9b065;font-size:12px;line-height:1.65;">${h.feedback.slice(0,120)}...</p></div>`:""}
    </div>`).join(""):'<p style="color:#506070;text-align:center;padding:40px 0;font-size:13px;">가이드 기록이 없습니다</p>';
}

async function renderAdmin() {
  const m=$("main");if(!m)return;
  if(!isAdmin()){m.innerHTML=`<p style="color:#d47a88;text-align:center;padding:40px;">관리자 권한이 없습니다.</p>`;return;}
  m.innerHTML=`<div style="text-align:center;padding:40px;color:#506070;">데이터 불러오는 중...</div>`;
  const [users,challenges,sessions,recordings,journals,guides,posts]=await Promise.all([
    FB.list("users"),FB.list("challenges"),FB.list("sessions"),
    FB.list("recordings"),FB.list("journals"),FB.list("guides"),FB.list("posts"),
  ]);
  window._adminData={users,challenges,sessions,recordings,journals,guides,posts};

  m.innerHTML=`
  <div style="max-width:640px;margin:0 auto;animation:fadeUp .4s ease both;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-family:'Noto Serif KR',serif;color:#62c9a2;font-size:22px;">교수자 대시보드</h2>
      <button onclick="renderAdmin()" style="padding:6px 14px;border-radius:20px;border:1px solid #1c2b40;background:transparent;color:#92aabf;font-size:12px;cursor:pointer;">새로고침</button>
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:22px;">
      ${[["adov","📊 개요"],["admb","📋 명부"],["adst","👥 학생"],["adj","📔 저널"],["adp","💬 게시글"],["adg","👩‍🏫 가이드"]].map(([id,l],i)=>`
      <button onclick="switchAdminTab('${id}')" id="at_${id}" style="padding:7px 14px;border-radius:20px;border:1px solid ${i===0?'#62c9a2':'#1c2b40'};background:${i===0?'#62c9a220':'transparent'};color:${i===0?'#62c9a2':'#92aabf'};font-size:12px;cursor:pointer;">${l}</button>`).join("")}
    </div>
    <div id="admin_content"></div>
  </div>`;
  renderAdminOverview();
}

function switchAdminTab(id) {
  document.querySelectorAll("[id^='at_']").forEach(b=>{
    const sel=b.id==="at_"+id;
    b.style.borderColor=sel?"#62c9a2":"#1c2b40";b.style.background=sel?"#62c9a220":"transparent";b.style.color=sel?"#62c9a2":"#92aabf";
  });
  if(id==="adov") renderAdminOverview();
  if(id==="admb") renderAdminMembers();
  if(id==="adst") renderAdminStudents();
  if(id==="adj")  renderAdminJournals();
  if(id==="adp")  renderAdminPosts();
  if(id==="adg")  renderAdminGuides();
}

function renderAdminMembers(){
  const {users,challenges,sessions,journals,guides,recordings}=window._adminData;
  const ac=$("admin_content");if(!ac)return;

  // users 컬렉션 기반으로 전체 가입자 명부 구성
  const memberList = users.map(u=>{
    const ch  = challenges.find(c=>c.uid===u.uid);
    const uss = sessions.filter(s=>s.uid===u.uid);
    const uj  = journals.filter(j=>j.uid===u.uid);
    const ug  = guides.filter(g=>g.uid===u.uid);
    const ur  = recordings.filter(r=>r.uid===u.uid);
    const totalMins = uss.reduce((a,s)=>a+(s.duration||0),0);
    return {
      name: u.name||u.displayName||"(이름없음)",
      email: u.email||"(이메일없음)",
      joined: u.lastLogin||u._updatedAt||"",
      sessions: uss.length, totalMins,
      journals: uj.length,
      guides: ug.length,
      recordings: ur.length,
      challenge: ch ? `${ch.checkedDates?.length||0}/${ch.totalDays}일` : "-",
      uid: u.uid,
    };
  }).sort((a,b)=>a.name.localeCompare(b.name,"ko"));

  ac.innerHTML=`
  <div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
    <div>
      <span style="color:#62c9a2;font-weight:700;font-size:18px;">${memberList.length}명</span>
      <span style="color:#506070;font-size:13px;margin-left:8px;">가입자 전체</span>
    </div>
    <div style="display:flex;gap:8px;">
      <input id="member_search" oninput="filterMembers()" placeholder="이름·이메일 검색" style="background:#121b2c;border:1px solid #1c2b40;border-radius:10px;padding:8px 13px;color:#dce8f2;font-size:13px;outline:none;width:160px;"/>
      <button onclick="exportMemberCSV()" style="padding:8px 16px;border-radius:20px;border:1.5px solid #62c9a2;background:#62c9a220;color:#62c9a2;font-size:12px;cursor:pointer;white-space:nowrap;">📥 CSV 저장</button>
    </div>
  </div>

  <!-- 테이블 헤더 -->
  <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;overflow:hidden;">
    <div style="display:grid;grid-template-columns:1fr 1.6fr 0.7fr 0.7fr 0.7fr 0.7fr 0.9fr;gap:0;background:#121b2c;padding:10px 14px;border-bottom:1px solid #1c2b40;">
      ${["이름","이메일","세션","총명상","저널","가이드","챌린지"].map(h=>`<span style="color:#506070;font-size:11px;font-weight:600;">${h}</span>`).join("")}
    </div>
    <div id="member_rows">
      ${memberList.map((m,i)=>`
      <div class="member-row" data-name="${m.name}" data-email="${m.email}" style="display:grid;grid-template-columns:1fr 1.6fr 0.7fr 0.7fr 0.7fr 0.7fr 0.9fr;gap:0;padding:11px 14px;border-bottom:1px solid #1c2b4044;background:${i%2===0?'transparent':'#0a1020'};">
        <span style="color:#dce8f2;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.name}</span>
        <span style="color:#92aabf;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.email}</span>
        <span style="color:#62c9a2;font-size:13px;text-align:center;">${m.sessions}</span>
        <span style="color:#7aaed4;font-size:13px;text-align:center;">${m.totalMins}분</span>
        <span style="color:#d9b065;font-size:13px;text-align:center;">${m.journals}</span>
        <span style="color:#a47ad4;font-size:13px;text-align:center;">${m.guides}</span>
        <span style="color:#62c9a2;font-size:12px;text-align:center;">${m.challenge}</span>
      </div>`).join("")}
    </div>
  </div>

  <!-- 카드뷰 (모바일) -->
  <div id="member_cards" style="display:none;margin-top:14px;">
    ${memberList.map((m,i)=>`
    <div class="member-card" data-name="${m.name}" data-email="${m.email}" style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="width:40px;height:40px;border-radius:50%;background:#62c9a225;display:flex;align-items:center;justify-content:center;color:#62c9a2;font-weight:700;font-size:16px;flex-shrink:0;">${m.name[0]||"?"}</div>
        <div style="flex:1;min-width:0;">
          <p style="color:#dce8f2;font-weight:600;font-size:15px;margin-bottom:2px;">${m.name}</p>
          <p style="color:#506070;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.email}</p>
        </div>
        <span style="padding:3px 10px;border-radius:10px;font-size:11px;background:#62c9a220;color:#62c9a2;white-space:nowrap;">챌린지 ${m.challenge}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        ${[{l:"세션",v:m.sessions,c:"#62c9a2"},{l:"명상",v:m.totalMins+"분",c:"#7aaed4"},{l:"저널",v:m.journals,c:"#d9b065"},{l:"가이드",v:m.guides,c:"#a47ad4"}].map(s=>`
        <div style="background:#121b2c;border-radius:10px;padding:8px 6px;text-align:center;border:1px solid #1c2b40;">
          <div style="color:${s.c};font-weight:700;font-size:16px;">${s.v}</div>
          <div style="color:#2a3a4a;font-size:10px;margin-top:2px;">${s.l}</div>
        </div>`).join("")}
      </div>
      ${m.joined?`<p style="color:#2a3a4a;font-size:11px;margin-top:10px;">최근 접속: ${fmtDT(m.joined)}</p>`:""}
    </div>`).join("")}
  </div>`;

  // 화면 너비에 따라 테이블/카드 전환
  const tableEl = ac.querySelector("#member_rows")?.closest("div");
  const cardEl  = $("member_cards");
  function checkWidth(){
    const w = ac.offsetWidth;
    if(tableEl) tableEl.style.display = w < 480 ? "none" : "block";
    if(cardEl)  cardEl.style.display  = w < 480 ? "block" : "none";
  }
  checkWidth();
  window._memberList = memberList;
}

function filterMembers() {
  const q = ($("member_search")?.value||"").toLowerCase();
  document.querySelectorAll(".member-row,.member-card").forEach(el=>{
    const name  = (el.dataset.name||"").toLowerCase();
    const email = (el.dataset.email||"").toLowerCase();
    el.style.display = (!q || name.includes(q) || email.includes(q)) ? "" : "none";
  });
}

function exportMemberCSV() {
  const list = window._memberList||[];
  const BOM = "﻿";
  const header = ["이름","이메일","세션수","총명상(분)","저널수","가이드수","챌린지진행"];
  const rows = list.map(m=>[m.name, m.email, m.sessions, m.totalMins, m.journals, m.guides, m.challenge]);
  const csv  = BOM + [header, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = `명상앱_명부_${today()}.csv`;
  a.click();
}

function renderAdminOverview(){

  const totalCheckins=challenges.reduce((a,c)=>a+(c.checkedDates?.length||0),0);
  const avgPct=challenges.length?Math.round(challenges.reduce((a,c)=>a+(c.checkedDates?.length||0)/(c.totalDays||30),0)/challenges.length*100):0;
  const ac=$("admin_content");if(!ac)return;
  ac.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;">
      ${[{l:"참여 학생",v:challenges.length+"명",c:"#62c9a2"},{l:"총 체크인",v:totalCheckins+"회",c:"#d9b065"},
         {l:"평균 진행률",v:avgPct+"%",c:"#62c9a2"},{l:"저널 작성",v:journals.length+"개",c:"#7aaed4"},
         {l:"녹음 업로드",v:recordings.length+"개",c:"#a47ad4"},{l:"가이드 제출",v:guides.length+"개",c:"#d47a88"}].map(s=>`
      <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:14px;">
        <div style="color:${s.c};font-weight:700;font-size:24px;margin-bottom:2px;">${s.v}</div>
        <div style="color:#506070;font-size:12px;">${s.l}</div>
      </div>`).join("")}
    </div>
    <div style="background:#0d1420;border-radius:14px;border:1px solid #1c2b40;padding:16px;">
      <p style="color:#92aabf;font-size:13px;margin-bottom:14px;">학생별 챌린지 진행률</p>
      ${challenges.sort((a,b)=>(b.checkedDates?.length/b.totalDays)-(a.checkedDates?.length/a.totalDays)).map(u=>{
        const ug=window._adminData.guides.filter(g=>g.uid===u.uid).length;
        const ur=window._adminData.recordings.filter(r=>r.uid===u.uid).length;
        return `<div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <div style="display:flex;gap:8px;align-items:center;">
              <span style="color:#dce8f2;font-size:13px;">${u.userName||u.uid}</span>
              ${ug>0?`<span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#d9b06520;color:#d9b065;">가이드 ${ug}</span>`:""}
              ${ur>0?`<span style="padding:2px 8px;border-radius:10px;font-size:10px;background:#a47ad420;color:#a47ad4;">녹음 ${ur}</span>`:""}
            </div>
            <span style="color:#92aabf;font-size:12px;">${u.checkedDates?.length||0}/${u.totalDays}일</span>
          </div>
          <div style="height:5px;background:#1c2b40;border-radius:3px;">
            <div style="height:5px;width:${Math.round((u.checkedDates?.length||0)/u.totalDays*100)}%;background:#62c9a2;border-radius:3px;"></div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
}

        <div style="width:40px;height:40px;border-radius:50%;background:#62c9a225;display:flex;align-items:center;justify-content:center;color:#62c9a2;font-weight:700;font-size:16px;">${u.userName?.[0]||"?"}</div>

          <p style="color:#dce8f2;font-weight:600;font-size:15px;margin-bottom:2px;">${u.userName}</p>
          <p style="color:#506070;font-size:12px;">${fmtDate(u.startDate)} ~ ${fmtDate(u.endDate)}</p>

      <div style="height:6px;background:#1c2b40;border-radius:3px;margin-bottom:14px;">
        <div style="height:6px;width:${pct}%;background:#62c9a2;border-radius:3px;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        ${[{i:"📔",l:"저널",v:uj,c:"#7aaed4"},{i:"👩‍🏫",l:"가이드",v:ug,c:"#d9b065"},{i:"🎙️",l:"녹음",v:ur,c:"#a47ad4"},{i:"📅",l:"체크인",v:u.checkedDates?.length||0,c:"#62c9a2"}].map(s=>`
